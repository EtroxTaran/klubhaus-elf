# Standalone internal docs stack, deployed independently (its redeploys/outages
# never touch anything else). Two auth-gated sites:
#   - docs       → the Obsidian vault (Quartz build) at DOCS_DOMAIN — default Quartz
#                  styling + graph view (the design lives in the styleguide, below).
#   - styleguide → the INTERACTIVE Aurelia Premier design styleguide (claude.ai/design
#                  export, Babylon-only) at STYLEGUIDE_DOMAIN — see tools/styleguide/.
#                  This is the design system, served separately from the wiki (Quartz
#                  is untouched). A bundled Storybook returns when the app is rebuilt.
#
#   docker compose -f docker-compose.docs.yml up -d --build
#
# Access control is fail-closed: DOCS_BASIC_AUTH MUST be set or the stack
# refuses to start, so this internal site can never deploy publicly by
# accident.
# Generate a value with:  htpasswd -nbB <user> <pass>
# and double every '$' to '$$' (compose escaping), e.g.
#   DOCS_BASIC_AUTH=docs:$$2y$$05$$....
services:
  docs:
    build:
      context: .
      dockerfile: tools/docs-preview/Dockerfile
      args:
        QUARTZ_REF: ${QUARTZ_REF:-v4}
        DOCS_DOMAIN: ${DOCS_DOMAIN:-docs.soccer-manager.etrox.de}
    labels:
      traefik.enable: "true"
      traefik.http.routers.soccer-docs.rule: Host(`${DOCS_DOMAIN:-docs.soccer-manager.etrox.de}`)
      traefik.http.routers.soccer-docs.entrypoints: websecure
      traefik.http.routers.soccer-docs.tls.certresolver: letsencrypt
      traefik.http.services.soccer-docs.loadbalancer.server.port: "80"
      traefik.http.routers.soccer-docs.middlewares: soccer-docs-auth
      traefik.http.middlewares.soccer-docs-auth.basicauth.users: ${DOCS_BASIC_AUTH:?set DOCS_BASIC_AUTH (htpasswd entries) to protect the docs site}
    ports:
      - "8081:80"
    restart: unless-stopped

  styleguide:
    build:
      context: .
      dockerfile: tools/styleguide/Dockerfile
    labels:
      traefik.enable: "true"
      traefik.http.routers.soccer-styleguide.rule: Host(`${STYLEGUIDE_DOMAIN:-styleguide.soccer-manager.etrox.de}`)
      traefik.http.routers.soccer-styleguide.entrypoints: websecure
      traefik.http.routers.soccer-styleguide.tls.certresolver: letsencrypt
      traefik.http.services.soccer-styleguide.loadbalancer.server.port: "80"
      traefik.http.routers.soccer-styleguide.middlewares: soccer-styleguide-auth
      traefik.http.middlewares.soccer-styleguide-auth.basicauth.users: ${DOCS_BASIC_AUTH:?set DOCS_BASIC_AUTH (htpasswd entries) to protect the styleguide site}
    ports:
      - "8082:80"
    restart: unless-stopped
