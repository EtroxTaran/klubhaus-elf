name: Setup
description: Install pnpm + Node and restore the workspace node_modules cache.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm
    - name: Restore node_modules
      id: nm-cache
      uses: actions/cache@v4
      with:
        # Full hardlinked workspace tree keyed on the lockfile. A hit lets
        # every job skip the ~840-package relink that `pnpm install` does.
        path: |
          node_modules
          apps/*/node_modules
          packages/*/node_modules
        key: nm-${{ runner.os }}-node22-${{ hashFiles('pnpm-lock.yaml') }}
    - name: Install dependencies
      if: steps.nm-cache.outputs.cache-hit != 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
