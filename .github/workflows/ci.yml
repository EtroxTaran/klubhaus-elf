name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  schedule:
    # Nightly full mutation run (authoritative, break threshold enforced).
    - cron: '0 3 * * *'

# Supersede in-flight runs for the same ref so PR status reflects the latest
# commit only (no stale red/green from outdated runs).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint:ci
      - run: pnpm typecheck
      - run: pnpm test -- --coverage
      - name: Coverage PR comment
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm knip
      - run: pnpm madge

  storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # Fails if any story is broken — keeps the deployed UI showcase green
      # and enforces the colocated-story rule (AGENTS.md / 09-Design-System §13).
      - run: pnpm --filter @soccer-manager/web build-storybook

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    # Rollout: advisory until the baseline is triaged, then drop this line.
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep OSS scan (accountless)
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/javascript \
            --config p/react \
            --config p/secrets \
            --sarif --output semgrep.sarif --error
      - name: Upload SARIF to code scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  mutation:
    needs: quality
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Restore Stryker incremental cache
        if: github.event_name == 'pull_request'
        uses: actions/cache@v4
        with:
          path: .stryker-tmp
          key: stryker-${{ hashFiles('packages/match-engine/src/**', 'packages/db-schema/src/**') }}
          restore-keys: stryker-
      - name: Mutation testing (PR — incremental, advisory)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: pnpm mutation:incremental
      - name: Mutation testing (nightly — full, enforced)
        if: github.event_name == 'schedule'
        run: pnpm mutation
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation

  e2e:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-
      - name: Install Playwright (browsers + OS deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm playwright install --with-deps chromium webkit
      - name: Install Playwright OS deps only (browsers cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm playwright install-deps chromium webkit
      # `pnpm test:e2e` builds the app via Playwright's webServer command,
      # so no separate build step is needed here.
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report

  lighthouse:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm --filter @soccer-manager/web preview &
      - uses: treosh/lighthouse-ci-action@v12
        with:
          urls: http://localhost:3000
          budgetPath: .github/lighthouse/budget.json
          # Median of 3 runs: removes LHCI run-to-run noise WITHOUT loosening
          # any budget. A real regression still exceeds the budget at median.
          runs: 3
          uploadArtifacts: true

  cursor-smoke:
    needs: [quality, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --check .cursor/hooks/policy.js
      - run: node --check .cursor/hooks/secret-scan.js
      - run: node --check .cursor/hooks/mcp-allowlist.js
      - run: node --check scripts/design-sync.mjs
      - run: pnpm test:cloud-env
      - run: node -e "JSON.parse(require('fs').readFileSync('.cursor/hooks.json', 'utf8'))"
