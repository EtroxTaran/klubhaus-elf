---
# ai-review-template-version: 0.1.1
# NOTE: parametrized from ai-portal@2026-04-20
# Changes:
#   - github.repository bleibt dynamisch (kein hardcoded EtroxTaran/ai-portal)
#   - Runs-on für handle-job via AI_REVIEW_STAGE_RUNS_ON (self-hosted);
#     issue_comment-Handler braucht nur gh-CLI-Calls
#   - Waiver-Comment: Referenz auf "docs/v2/30-guides/AI-REVIEW-RUNBOOK.md" entfernt
#     (projekt-spezifisch); durch generischen Hinweis ersetzt
#   - TELEGRAM_NOTIFICATION_WEBHOOK entfernt (kein Notification-Schritt in diesem
#     Workflow verwendet es; Discord-Webhook optional über ai-review-auto-fix)
#   - Kein pull_request_target verwendet — Trigger ist issue_comment (konform)
#   - Security: Nur trusted PR-Author darf kommandieren (check bleibt erhalten)

name: AI Review — Nachfrage-Response

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GH_REPO: ${{ github.repository }}
  AI_REVIEW_DISPATCH_URL: ${{ vars.AI_REVIEW_DISPATCH_URL || secrets.AI_REVIEW_DISPATCH_URL ||
    'http://127.0.0.1:5680/webhook/ai-review-dispatch' }}

# Triggert auf PR-Comment mit einem der 4 Kommandos:
#   - /ai-review approve                    → Consensus-Override auf success
#   - /ai-review retry                      → alle Stages neu
#   - /ai-review security-waiver <reason>   → Security-Veto mit Audit-Trail overriden
#   - /ai-review ac-waiver <reason>         → AC-Veto mit Audit-Trail overriden
#   - /ai-review docs-waiver <reason>       → Docs-Veto SHA-gebunden auditieren
#
# Security-Policy:
#   - Nur der trusted PR-Author darf kommandieren. Wird explizit geprüft.
#   - `/ai-review approve` darf KEIN Security-Veto überschreiben. Wenn
#     ai-review/security=failure, wird der Approve geblockt mit einer
#     Hinweis-Antwort; trusted PR-Author muss dann bewusst `/ai-review security-waiver`
#     mit einer ≥30-Zeichen-Begründung posten.
#   - `/ai-review security-waiver` setzt `ai-review/security-waiver=success`
#     mit der Reason in der description. consensus_status() liest
#     diesen Status und lässt die Consensus grün werden trotz security=failure.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  statuses: write
  actions: write # workflow_dispatch für retry
  pull-requests: write # gh pr comment für guard-replies

jobs:
  handle:
    # Nur auf PR-Comments (nicht auf Issue-Comments) mit /ai-review-Kommando
    if: |
      github.event.issue.pull_request != null &&
      (startsWith(github.event.comment.body, '/ai-review approve') ||
       startsWith(github.event.comment.body, '/ai-review retry') ||
       startsWith(github.event.comment.body, '/ai-review security-waiver') ||
       startsWith(github.event.comment.body, '/ai-review ac-waiver') ||
       startsWith(github.event.comment.body, '/ai-review docs-waiver'))
    runs-on: ${{ fromJSON(vars.AI_REVIEW_STAGE_RUNS_ON || '["self-hosted","r2d2","ai-review"]') }}
    timeout-minutes: 3
    steps:
      # setup-python liefert pip aus dem Tool-Cache — der bare Runner hat
      # kein System-pip (python3-pip-Live-Apply via Phase 65 ist gated, #270).
      # Die pip-install-Steps (retry_ai_review_install) weiter unten brauchen es.
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Resolve PR-Author + head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          meta=$(gh pr view "$PR_NUMBER" --json author,headRefOid --repo ${{ github.repository }})
          author=$(echo "$meta" | python3 -c "import json,sys; print(json.load(sys.stdin)['author']['login'])")
          sha=$(echo "$meta" | python3 -c "import json,sys; print(json.load(sys.stdin)['headRefOid'])")
          echo "author=$author" >> "$GITHUB_OUTPUT"
          echo "sha=$sha"       >> "$GITHUB_OUTPUT"

      - name: Authorization — only trusted PR author may act
        id: auth
        env:
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          TRUSTED_AUTHOR_ASSOCIATIONS: OWNER MEMBER COLLABORATOR
        run: |
          if [ "$COMMENT_AUTHOR" != "$PR_AUTHOR" ]; then
            echo "Comment-Author '$COMMENT_AUTHOR' ist nicht PR-Author '$PR_AUTHOR' — ignoriere."
            echo "authorized=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case " $TRUSTED_AUTHOR_ASSOCIATIONS " in
            *" $COMMENT_AUTHOR_ASSOCIATION "*) ;;
            *)
              echo "PR-Author '$COMMENT_AUTHOR' ist nicht trusted ($COMMENT_AUTHOR_ASSOCIATION) — ignoriere."
              echo "authorized=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          echo "authorized=true" >> "$GITHUB_OUTPUT"
          echo "Authorized"

      # Guard — Approve darf Security-Veto nicht überschreiben.
      - name: Check security-veto state (guard for approve)
        id: security_check
        if: |
          steps.auth.outputs.authorized == 'true' &&
          startsWith(github.event.comment.body, '/ai-review approve')
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          PR_HEAD: ${{ steps.pr.outputs.sha }}
        run: |
          set -euo pipefail
          statuses=$(gh api "repos/${{ github.repository }}/commits/$PR_HEAD/statuses")
          sec_state=$(echo "$statuses" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for s in data:
              if s.get('context') == 'ai-review/security':
                  print(s.get('state', 'pending'))
                  sys.exit(0)
          print('pending')
          ")
          waiver_state=$(echo "$statuses" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for s in data:
              if s.get('context') == 'ai-review/security-waiver':
                  print(s.get('state', 'pending'))
                  sys.exit(0)
          print('pending')
          ")
          echo "security=$sec_state"       >> "$GITHUB_OUTPUT"
          echo "waiver=$waiver_state"      >> "$GITHUB_OUTPUT"
          echo "security=$sec_state  waiver=$waiver_state"

      - name: Check hard-failure state (guard for approve)
        id: hard_failure_check
        if: |
          steps.auth.outputs.authorized == 'true' &&
          startsWith(github.event.comment.body, '/ai-review approve')
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          PR_HEAD: ${{ steps.pr.outputs.sha }}
        run: |
          set -euo pipefail
          statuses=$(gh api "repos/${{ github.repository }}/commits/$PR_HEAD/statuses")
          hard_failures=$(STATUSES="$statuses" python3 <<'PY'
          import json
          import os
          import sys

          data = json.loads(os.environ["STATUSES"])
          latest = {}
          for status in data:
              context = status.get("context")
              if context and context not in latest:
                  latest[context] = {
                      "state": status.get("state", "pending"),
                      "description": status.get("description") or "",
                  }

          failures = []
          ac_state = latest.get("ai-review/ac-validation", {}).get("state", "pending")
          ac_waiver_state = latest.get("ai-review/ac-waiver", {}).get("state", "pending")
          if ac_state == "failure" and ac_waiver_state != "success":
              failures.append("ai-review/ac-validation")

          docs_state = latest.get("ai-review/docs-validation", {}).get("state", "pending")
          docs_waiver_state = latest.get("ai-review/docs-waiver", {}).get("state", "pending")
          if docs_state == "error" or (
              docs_state == "failure" and docs_waiver_state != "success"
          ):
              failures.append("ai-review/docs-validation")

          print(",".join(failures))
          PY
          )
          if [ -n "$hard_failures" ]; then
            count=$(printf '%s' "$hard_failures" | tr ',' '\n' | grep -c .)
          else
            count=0
          fi
          echo "hard_failures=$count" >> "$GITHUB_OUTPUT"
          echo "contexts=$hard_failures" >> "$GITHUB_OUTPUT"
          echo "hard_failures=$hard_failures"

      - name: Check soft-consensus state (guard for approve)
        id: consensus_approve_check
        if: |
          steps.auth.outputs.authorized == 'true' &&
          startsWith(github.event.comment.body, '/ai-review approve')
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          PR_HEAD: ${{ steps.pr.outputs.sha }}
        run: |
          set -euo pipefail
          statuses=$(gh api "repos/${{ github.repository }}/commits/$PR_HEAD/statuses")
          result=$(STATUSES="$statuses" python3 <<'PY'
          import json
          import os

          data = json.loads(os.environ["STATUSES"])
          consensus = None
          for status in data:
              if status.get("context") == "ai-review/consensus":
                  consensus = status
                  break
          state = (consensus or {}).get("state", "pending")
          description = (consensus or {}).get("description") or ""
          eligible = state == "success" or (state == "pending" and "human ACK" in description)
          print(f"eligible={'true' if eligible else 'false'}")
          print(f"state={state}")
          print(f"description={description}")
          PY
          )
          printf '%s\n' "$result" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$result"

      - name: Block approve when security=failure without waiver
        if: |
          startsWith(github.event.comment.body, '/ai-review approve') &&
          steps.auth.outputs.authorized == 'true' &&
          steps.security_check.outputs.security == 'failure' &&
          steps.security_check.outputs.waiver != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" --body "$(cat <<'EOF'
          **`/ai-review approve` blockiert — Security-Veto aktiv.**

          `ai-review/security` steht auf `failure`. Ein Blanket-`approve` überschreibt
          kein Security-Veto (AI-Review-Policy).

          Wenn das Security-Finding ein False-Positive ist, nutze stattdessen:

          ```
          /ai-review security-waiver <mindestens 30 Zeichen Begruendung>
          ```

          Die Begründung wird im Commit-Status `ai-review/security-waiver` und im PR
          als Audit-Trail sichtbar.
          EOF
          )"
          echo "approve blocked — pending security-waiver"
          exit 0

      - name: Block approve when hard failures remain
        if: |
          startsWith(github.event.comment.body, '/ai-review approve') &&
          steps.auth.outputs.authorized == 'true' &&
          steps.hard_failure_check.outputs.hard_failures != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          HARD_FAILURE_CONTEXTS: ${{ steps.hard_failure_check.outputs.contexts }}
        run: |
          set -euo pipefail
          body=$(python3 <<'PY'
          import os

          print(f"""**`/ai-review approve` blockiert — Hard-Failure aktiv.**

          Mindestens eine Review-Stage steht auf `failure`. Ein Blanket-`approve`
          überschreibt nur Soft-Consensus, aber keine harten Stage-Fehler.

          Betroffene Kontexte:

          ```
          {os.environ["HARD_FAILURE_CONTEXTS"]}
          ```

          Fixe die Findings oder nutze den passenden, auditierbaren Waiver-Command.""")
          PY
          )
          gh pr comment "$PR_NUMBER" --body "$body"
          echo "approve blocked — hard failures remain: $HARD_FAILURE_CONTEXTS"
          exit 0

      - name: Block approve when consensus is not waiting for human ACK
        if: |
          startsWith(github.event.comment.body, '/ai-review approve') &&
          steps.auth.outputs.authorized == 'true' &&
          steps.hard_failure_check.outputs.hard_failures == '0' &&
          steps.consensus_approve_check.outputs.eligible != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          CONSENSUS_STATE: ${{ steps.consensus_approve_check.outputs.state }}
          CONSENSUS_DESCRIPTION: ${{ steps.consensus_approve_check.outputs.description }}
        run: |
          set -euo pipefail
          body=$(python3 <<'PY'
          import os

          print(f"""**`/ai-review approve` blockiert — kein Soft-Consensus offen.**

          `/ai-review approve` ist nur für den Nachfrage-Pfad gedacht: `ai-review/consensus`
          muss entweder bereits `success` sein oder auf `pending` mit `human ACK` stehen.

          Aktueller Consensus:

          ```
          state={os.environ["CONSENSUS_STATE"]}
          description={os.environ["CONSENSUS_DESCRIPTION"]}
          ```""")
          PY
          )
          gh pr comment "$PR_NUMBER" --body "$body"
          echo "approve blocked — consensus is not waiting for human ACK"
          exit 0

      - name: Apply approve — override consensus to success
        if: |
          startsWith(github.event.comment.body, '/ai-review approve') &&
          steps.auth.outputs.authorized == 'true' &&
          steps.hard_failure_check.outputs.hard_failures == '0' &&
          steps.consensus_approve_check.outputs.eligible == 'true' &&
          (steps.security_check.outputs.security != 'failure' ||
           steps.security_check.outputs.waiver == 'success')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD: ${{ steps.pr.outputs.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/$PR_HEAD" \
            -f state=success \
            -f context="ai-review/consensus" \
            -f description="Human-override: /ai-review approve by PR-Author" \
            -f target_url="$TARGET_URL"
          echo "ai-review/consensus → success (human-override)"

      # Security-Waiver — validiert reason, setzt Commit-Status.
      - name: Apply security-waiver — validate reason + set commit status
        if: |
          steps.auth.outputs.authorized == 'true' &&
          startsWith(github.event.comment.body, '/ai-review security-waiver')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD: ${{ steps.pr.outputs.sha }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          # Reason extrahieren (alles nach `/ai-review security-waiver `)
          reason=$(python3 <<'PY'
          import os, re
          body = os.environ["COMMENT_BODY"]
          m = re.search(r"^/ai-review\s+security-waiver\s*(.*)$", body, re.IGNORECASE | re.MULTILINE)
          if not m:
              print("")
          else:
              print((m.group(1) or "").strip())
          PY
          )
          min_len=30
          if [ "${#reason}" -lt "$min_len" ]; then
            body=$(MIN_LEN="$min_len" python3 <<'PY'
          import os

          print(f"""**Security-Waiver zurückgewiesen — Begründung zu kurz.**

          Die Begründung muss mindestens **{os.environ["MIN_LEN"]} Zeichen** umfassen. Gib eine
          ausführliche Erklärung, warum das Security-Finding ein False-Positive ist.

          Beispiel:
          ```
          /ai-review security-waiver False-Positive: Gemini hat Zeile 29 (runs-on) mit actions/checkout verwechselt
          ```""")
          PY
          )
            gh pr comment "$PR_NUMBER" --body "$body"
            echo "waiver rejected — reason too short (${#reason} < $min_len)"
            exit 0
          fi

          # Commit-Status mit reason in description (max 140 chars — GitHub-Limit)
          description=$(REASON="$reason" python3 <<'PY'
          import os

          print(("Waiver by PR-Author: " + os.environ["REASON"])[:140])
          PY
          )
          gh api "repos/${{ github.repository }}/statuses/$PR_HEAD" \
            -f state=success \
            -f context="ai-review/security-waiver" \
            -f description="$description" \
            -f target_url="$TARGET_URL"
          echo "ai-review/security-waiver → success ($description)"

          # Sticky-Audit-Comment — überschreibt vorherigen Waiver-Comment falls existent
          tmpfile=$(mktemp)
          PR_AUTHOR="${{ steps.pr.outputs.author }}" \
          PR_HEAD="$PR_HEAD" \
          REPOSITORY="${{ github.repository }}" \
          WAIVER_REASON="$reason" \
          python3 > "$tmpfile" <<'PY'
          import os

          print(f"""<!-- ai-review-security-waiver -->
          ## Security-Waiver gesetzt

          **PR-Author:** @{os.environ["PR_AUTHOR"]}
          **Commit:** `{os.environ["PR_HEAD"]}`
          **Begründung (Audit-Trail):**

          > {os.environ["WAIVER_REASON"]}

          Das Security-Finding wurde bewusst als False-Positive markiert. Der
          ursprüngliche Security-Report (`ai-review/security`) bleibt unverändert.
          Nur der Consensus-Check (`ai-review/consensus`) darf jetzt grün werden,
          wenn Code + Design + AC-Validation OK sind.

          _Audit-Query: `gh api repos/{os.environ["REPOSITORY"]}/commits/{os.environ["PR_HEAD"]}/statuses |
          jq '.[] | select(.context == "ai-review/security-waiver")'`_""")
          PY
          # Existierenden Waiver-Comment finden + updaten, sonst neu posten
          existing=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("ai-review-security-waiver")) | .id' | head -n1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$existing" \
              -f body="$(cat "$tmpfile")" >/dev/null
            echo "waiver-comment updated (id=$existing)"
          else
            gh pr comment "$PR_NUMBER" --body "$(cat "$tmpfile")"
            echo "waiver-comment posted"
          fi
          rm -f "$tmpfile"

      - name: Recompute consensus after security-waiver
        if: |
          steps.auth.outputs.authorized == 'true' &&
          startsWith(github.event.comment.body, '/ai-review security-waiver')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD: ${{ steps.pr.outputs.sha }}
          PR_NUMBER: ${{ github.event.issue.number }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          retry_ai_review_install() {
            local attempt=1
            local max_attempts=3
            local delay=5
            until "$@"; do
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::command failed after ${attempt} attempts: $*"
                return "$status"
              fi
              echo "command failed (attempt ${attempt}/${max_attempts}); retrying in ${delay}s: $*"
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          tmp_pipeline="$(mktemp -d)"
          retry_ai_review_install gh repo clone EtroxTaran/x-ai-stack "$tmp_pipeline" -- --depth 1 --branch main
          retry_ai_review_install pip install "$tmp_pipeline/packages/ai-review-pipeline"
          ai-review consensus \
            --sha "$PR_HEAD" \
            --pr "$PR_NUMBER" \
            --target-url "$TARGET_URL"

      # AC-Waiver — validiert reason, setzt Commit-Status.
      - name: Apply ac-waiver — validate reason + set commit status
        if: |
          steps.auth.outputs.authorized == 'true' &&
          startsWith(github.event.comment.body, '/ai-review ac-waiver')
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          PR_HEAD: ${{ steps.pr.outputs.sha }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          reason=$(python3 <<'PY'
          import os, re
          body = os.environ["COMMENT_BODY"]
          m = re.search(r"^/ai-review\s+ac-waiver\s*(.*)$", body, re.IGNORECASE | re.MULTILINE)
          if not m:
              print("")
          else:
              print((m.group(1) or "").strip())
          PY
          )
          min_len=30
          if [ "${#reason}" -lt "$min_len" ]; then
            body=$(MIN_LEN="$min_len" python3 <<'PY'
          import os

          print(f"""**AC-Waiver zurückgewiesen — Begründung zu kurz.**

          Die Begründung muss mindestens **{os.environ["MIN_LEN"]} Zeichen** umfassen.
          Nenne das betroffene AC und die Testdatei oder den manuellen Smoke-Pfad.

          Beispiel:
          ```
          /ai-review ac-waiver AC-2 ist durch e2e/onboarding.spec.ts abgedeckt; \
          der Parser erkennt den Scenario-Titel nicht.
          ```""")
          PY
          )
            gh pr comment "$PR_NUMBER" --body "$body"
            echo "ac-waiver rejected — reason too short (${#reason} < $min_len)"
            exit 0
          fi

          description=$(REASON="$reason" python3 <<'PY'
          import os

          print(("Waiver by PR-Author: " + os.environ["REASON"])[:140])
          PY
          )
          gh api "repos/${{ github.repository }}/statuses/$PR_HEAD" \
            -f state=success \
            -f context="ai-review/ac-waiver" \
            -f description="$description" \
            -f target_url="$TARGET_URL"
          echo "ai-review/ac-waiver → success ($description)"

          tmpfile=$(mktemp)
          PR_AUTHOR="${{ steps.pr.outputs.author }}" \
          PR_HEAD="$PR_HEAD" \
          REPOSITORY="${{ github.repository }}" \
          WAIVER_REASON="$reason" \
          python3 > "$tmpfile" <<'PY'
          import os

          print(f"""<!-- ai-review-ac-waiver -->
          ## AC-Waiver gesetzt

          **PR-Author:** @{os.environ["PR_AUTHOR"]}
          **Commit:** `{os.environ["PR_HEAD"]}`
          **Begründung (Audit-Trail):**

          > {os.environ["WAIVER_REASON"]}

          Das AC-Validation-Finding wurde bewusst als False-Positive markiert.
          Der ursprüngliche AC-Report (`ai-review/ac-validation`) bleibt unverändert.
          Nur der Consensus-Check (`ai-review/consensus`) darf jetzt grün werden,
          wenn Code + Security + Design OK sind.

          _Audit-Query: `gh api repos/{os.environ["REPOSITORY"]}/commits/{os.environ["PR_HEAD"]}/statuses |
          jq '.[] | select(.context == "ai-review/ac-waiver")'`_""")
          PY
          existing=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("ai-review-ac-waiver")) | .id' | head -n1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$existing" \
              -f body="$(cat "$tmpfile")" >/dev/null
            echo "ac-waiver-comment updated (id=$existing)"
          else
            gh pr comment "$PR_NUMBER" --body "$(cat "$tmpfile")"
            echo "ac-waiver-comment posted"
          fi
          rm -f "$tmpfile"

      - name: Recompute consensus after ac-waiver
        if: |
          steps.auth.outputs.authorized == 'true' &&
          startsWith(github.event.comment.body, '/ai-review ac-waiver')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD: ${{ steps.pr.outputs.sha }}
          PR_NUMBER: ${{ github.event.issue.number }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          retry_ai_review_install() {
            local attempt=1
            local max_attempts=3
            local delay=5
            until "$@"; do
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::command failed after ${attempt} attempts: $*"
                return "$status"
              fi
              echo "command failed (attempt ${attempt}/${max_attempts}); retrying in ${delay}s: $*"
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          tmp_pipeline="$(mktemp -d)"
          retry_ai_review_install gh repo clone EtroxTaran/x-ai-stack "$tmp_pipeline" -- --depth 1 --branch main
          retry_ai_review_install pip install "$tmp_pipeline/packages/ai-review-pipeline"
          ai-review consensus \
            --sha "$PR_HEAD" \
            --pr "$PR_NUMBER" \
            --target-url "$TARGET_URL"

      - name: Apply docs-waiver — validate reason + write SHA-bound audit
        if: |
          steps.auth.outputs.authorized == 'true' &&
          startsWith(github.event.comment.body, '/ai-review docs-waiver')
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          PR_HEAD: ${{ steps.pr.outputs.sha }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_CREATED_AT: ${{ github.event.comment.created_at }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          reason=$(python3 <<'PY'
          import os
          import re

          match = re.search(
              r"^/ai-review\s+docs-waiver\s*(.*)$",
              os.environ["COMMENT_BODY"],
              re.IGNORECASE | re.MULTILINE,
          )
          print((match.group(1) if match else "").strip())
          PY
          )
          if [ "${#reason}" -lt 30 ]; then
            gh pr comment "$PR_NUMBER" --body "Docs-Waiver zurückgewiesen: reason muss mindestens 30 Zeichen enthalten."
            exit 0
          fi

          description=$(REASON="$reason" python3 <<'PY'
          import os
          print(("Docs waiver by PR author: " + os.environ["REASON"])[:140])
          PY
          )
          gh api "repos/${{ github.repository }}/statuses/$PR_HEAD" \
            -f state=success \
            -f context="ai-review/docs-waiver" \
            -f description="$description" \
            -f target_url="$TARGET_URL"

          audit_file=$(mktemp)
          REASON="$reason" python3 > "$audit_file" <<'PY'
          import os

          print(f"""<!-- ai-review-docs-waiver -->
          ## Documentation waiver

          **Actor:** @{os.environ["COMMENT_AUTHOR"]}
          **Commit:** `{os.environ["PR_HEAD"]}`
          **created_at:** {os.environ["COMMENT_CREATED_AT"]}
          **Finding:** `ai-review/docs-validation`
          **Reason:** {os.environ["REASON"]}

          Only the documentation-validation finding on this exact SHA is waived.
          The original `ai-review/docs-validation` status remains unchanged.""")
          PY
          existing=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("ai-review-docs-waiver")) | .id' | head -n1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$existing" \
              -f body="$(cat "$audit_file")" >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body "$(cat "$audit_file")"
          fi
          rm -f "$audit_file"

      - name: Recompute consensus after docs-waiver
        if: |
          steps.auth.outputs.authorized == 'true' &&
          startsWith(github.event.comment.body, '/ai-review docs-waiver')
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          PR_HEAD: ${{ steps.pr.outputs.sha }}
          PR_NUMBER: ${{ github.event.issue.number }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          retry_ai_review_install() {
            local attempt=1
            local max_attempts=3
            local delay=5
            until "$@"; do
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                return "$status"
              fi
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }
          tmp_pipeline="$(mktemp -d)"
          retry_ai_review_install gh repo clone EtroxTaran/x-ai-stack "$tmp_pipeline" -- --depth 1 --branch main
          retry_ai_review_install pip install "$tmp_pipeline/packages/ai-review-pipeline"
          config_file="$(mktemp)"
          gh api \
            -H "Accept: application/vnd.github.raw+json" \
            "repos/${{ github.repository }}/contents/.ai-review/config.yaml?ref=$PR_HEAD" \
            > "$config_file"
          ai-review consensus \
            --sha "$PR_HEAD" \
            --pr "$PR_NUMBER" \
            --target-url "$TARGET_URL" \
            --config-file "$config_file"

      - name: Apply retry — dispatch autonomous repair orchestrator
        if: |
          steps.auth.outputs.authorized == 'true' &&
          startsWith(github.event.comment.body, '/ai-review retry')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          PR_HEAD: ${{ steps.pr.outputs.sha }}
        run: |
          set -euo pipefail
          echo "/ai-review retry — PR #$PR_NUMBER"
          # retry delegiert an den Orchestrator. Dieser entscheidet Level 0-4,
          # startet bei fixbaren Findings den Claude-Repair-Pass und schreibt
          # `.ai-review/audit.jsonl` + PR-Sticky-Comment.
          dispatched=1
          if gh workflow run ai-review-autonomous-repair.yml \
               --field pr_number="$PR_NUMBER" \
               --field max_iterations="4" 2>/dev/null; then
            dispatched=0
            echo "autonomous repair workflow dispatched"
          else
            echo "autonomous repair workflow_dispatch failed (not deployed yet?)"
          fi

          # Consensus + Code-Stage-Status auf pending zurücksetzen
          TARGET_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh api "repos/${{ github.repository }}/statuses/$PR_HEAD" \
            -f state=pending \
            -f context="ai-review/consensus" \
            -f description="Retry requested — waiting for stages to re-run" \
            -f target_url="$TARGET_URL" || true

          if [ "$dispatched" -eq 0 ]; then
            gh pr comment "$PR_NUMBER" --body \
              "**Retry requested** — \`ai-review-autonomous-repair.yml\` dispatched. Der Orchestrator \
          entscheidet Level 0-4, schreibt Audit-Trail und startet bei fixbaren Findings den Repair-Pass. \
          Wenn ein Fix-Commit entsteht, laufen alle Stages via \`pull_request.synchronize\` neu."
          else
            gh pr comment "$PR_NUMBER" --body \
              "**Retry requested by PR-Author** — push a new commit or close+reopen this PR to re-trigger stages. \
          (\`ai-review-autonomous-repair.yml\` dispatch failed — check runner registration)"
          fi
