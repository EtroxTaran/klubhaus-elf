---
# ai-review-template-version: 0.1.1
# NOTE: parametrized from ai-portal@2026-04-20
# Changes:
#   - python3 -m scripts.ai-review.auto_fix → python -m ai_review_pipeline.stages.auto_fix
#   - TELEGRAM_NOTIFICATION_WEBHOOK → DISCORD_NOTIFICATION_WEBHOOK
#   - github.repository bleibt dynamisch
#   - Preflight laeuft im ai-review CLI; Consumer-Repos brauchen kein separates Preflight-Skript
#   - Post-fix test-Kommando (`pnpm typecheck + test --changed`) ist projekt-spezifisch:
#     Consumer muss AI_REVIEW_POSTFIX_CHECK env-Var oder Script-Override setzen
#     (Default im Python-Script: `true` / no-op bis Consumer konfiguriert)
#   - Kein pull_request_target verwendet — Trigger ist workflow_dispatch (konform)
# Wave 5 (2026-04-20):
#   - python -m ai_review_pipeline.stages.auto_fix → ai-review auto-fix

name: AI Review — Auto-Fix

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AI_REVIEW_DISPATCH_URL: ${{ vars.AI_REVIEW_DISPATCH_URL || secrets.AI_REVIEW_DISPATCH_URL ||
    'http://127.0.0.1:5680/webhook/ai-review-dispatch' }}

# Cross-stage Auto-Fix-Agent — getriggert via workflow_dispatch.
# Aufrufer:
#   • Discord-Button "Auto-Fix" (n8n-callback-Workflow)
#   • /ai-review retry PR-Comment (delegiert via ai-review-nachfrage.yml)
#   • Manuell: gh workflow run ai-review-auto-fix.yml --field pr_number=42 ...
#
# Identity: github-actions[bot] mit default GITHUB_TOKEN.
# KEIN separater Bot-Account nötig — Claude/Codex/Gemini/Cursor OAuth liegt
# lokal auf dem self-hosted r2d2-Runner in ~/.claude, ~/.codex, etc.
#
# Ablauf:
#   1. Checkout PR head (fetch-depth=0 für diff-range)
#   2. Preflight: claude CLI OAuth present
#   3. ai_review_pipeline.stages.auto_fix führt 1-Pass-Fix aus (kein fix_loop,
#      das wäre doppelt nach dem Re-Review-Cascade)
#   4. Auto_fix pushed direkt; pull_request.synchronize feuert alle Stages neu
#
# Guard-Rails (im Python enforced):
#   - max 10 Files changed (AUTO_FIX_MAX_FILES env override)
#   - nur Files aus den Review-Findings-Sticky-Comments dürfen geändert werden
#   - post-fix check (projekt-konfigurierbar via AI_REVIEW_POSTFIX_CHECK) muss grün sein
#   - bei Fail: rollback via git reset --hard, kein push

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number to auto-fix'
        required: true
        type: string
      reason:
        description: 'Trigger-Quelle (discord-button / manual-retry / direct / ...)'
        required: true
        default: 'direct'
        type: string
      context_hint:
        description: "Optional hint fuer den Fix-Agent (z. B. 'Cursor: N+1 in routes/x.ts:42')"
        required: false
        default: ''
        type: string
      max_files:
        description: 'Max changed files guard-rail (default 10)'
        required: false
        default: '10'
        type: string

concurrency:
  group: ai-review-auto-fix-${{ inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: write # Auto-fix pusht direkt auf PR-Branch
  pull-requests: write # Sticky comments (falls auto_fix eskaliert)
  statuses: write # zum Dokumentieren des Ergebnisses
  actions: read

jobs:
  auto-fix:
    runs-on: ${{ fromJSON(vars.AI_REVIEW_STAGE_RUNS_ON || '["self-hosted","r2d2","ai-review"]') }}
    timeout-minutes: 20
    steps:
      - name: Resolve PR head SHA + branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          meta=$(gh pr view "$PR_NUMBER" \
                  --json headRefOid,headRefName,baseRefName,isCrossRepository \
                  --repo "$REPOSITORY")
          sha=$(echo "$meta" | python3 -c "import json,sys; print(json.load(sys.stdin)['headRefOid'])")
          branch=$(echo "$meta" | python3 -c "import json,sys; print(json.load(sys.stdin)['headRefName'])")
          base=$(echo "$meta" | python3 -c "import json,sys; print(json.load(sys.stdin)['baseRefName'])")
          is_cross_repo=$(echo "$meta" | python3 -c "import json,sys; print(
            str(json.load(sys.stdin)['isCrossRepository']).lower())")
          echo "sha=$sha"       >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "base=$base"     >> "$GITHUB_OUTPUT"
          if [ "$is_cross_repo" = "true" ]; then
            echo "same_repo=false" >> "$GITHUB_OUTPUT"
          else
            echo "same_repo=true" >> "$GITHUB_OUTPUT"
          fi
          echo "PR #$PR_NUMBER: branch=$branch base=$base sha=$sha cross_repo=$is_cross_repo"

      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.3
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0 # History für diff-range

      - name: Bootstrap runner PATH
        run: |
          echo "/usr/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install ai-review-pipeline
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Consumer repos never install ai-review-pipeline from the PR worktree on a
          # self-hosted runner. The central pipeline repo may dogfood its local
          # package only for same-repo branches, never for forks.
          if [ "${{ github.repository }}" = "EtroxTaran/x-ai-stack" ] && \
             [ "${{ steps.pr.outputs.same_repo }}" = "true" ]; then
            pip install -e packages/ai-review-pipeline
          else
            retry_ai_review_install() {
              local attempt=1
              local max_attempts=3
              local delay=5
              until "$@"; do
                local status=$?
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "::error::command failed after ${attempt} attempts: $*"
                  return "$status"
                fi
                echo "command failed (attempt ${attempt}/${max_attempts}); retrying in ${delay}s: $*"
                sleep "$delay"
                attempt=$((attempt + 1))
                delay=$((delay * 2))
              done
            }
            tmp_pipeline="$(mktemp -d)"
            retry_ai_review_install gh repo clone EtroxTaran/x-ai-stack "$tmp_pipeline" -- --depth 1 --branch main
            retry_ai_review_install pip install "$tmp_pipeline/packages/ai-review-pipeline"
          fi

      - name: Git identity (github-actions[bot])
        # Auto-Fix-Commits sollen klar als Bot-commits erkennbar sein,
        # damit sie im git log von menschlichen Commits trennbar sind.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Preflight — claude CLI OAuth presence
        run: echo "preflight skipped; ai-review stage runs with --skip-preflight"

      - name: Run Auto-Fix (single-pass)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          AUTO_FIX_MAX_FILES: ${{ inputs.max_files }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REASON: ${{ inputs.reason }}
          CONTEXT_HINT: ${{ inputs.context_hint }}
          DISCORD_NOTIFICATION_WEBHOOK: ${{ secrets.DISCORD_NOTIFICATION_WEBHOOK }}
          # Consumer-Repo kann dieses Script überschreiben um projekt-spezifische
          # Post-Fix-Checks durchzuführen (z. B. pnpm typecheck && pnpm test --changed)
          AI_REVIEW_POSTFIX_CHECK: ${{ vars.AI_REVIEW_POSTFIX_CHECK || '' }}
        run: |
          # TELEGRAM_OPS_BOT_TOKEN / TELEGRAM_OPS_CHAT_ID / TELEGRAM_OPS_TOPIC_AI_REVIEW: bb8-local (gateway.env),
          # never on GitHub
          set -a; source "$HOME/.config/hermes/gateway.env" 2>/dev/null || true; set +a
          ai-review auto-fix \
            --pr "$PR_NUMBER" \
            --reason "$REASON" \
            --context-hint "$CONTEXT_HINT" \
            --max-files "$AUTO_FIX_MAX_FILES" \
            --worktree "$GITHUB_WORKSPACE"

      - name: Report outcome on PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUTCOME: ${{ job.status }}
          REASON: ${{ inputs.reason }}
          CONTEXT_HINT: ${{ inputs.context_hint }}
        run: |
          set -euo pipefail
          if [ "$OUTCOME" = "success" ]; then
            body=$(python3 <<'PY'
          import os

          print(f"""**Auto-Fix completed** — [run]({os.environ["RUN_URL"]})

          Trigger: `{os.environ["REASON"]}`
          Context: `{os.environ["CONTEXT_HINT"]}`

          Falls ein Commit geschrieben wurde, hat er bereits den konfigurierten
          Post-Fix-Check bestanden; die Stages re-runnen jetzt automatisch
          via `pull_request.synchronize`.""")
          PY
          )
          else
            body=$(python3 <<'PY'
          import os

          print(f"""**Auto-Fix failed** — [run]({os.environ["RUN_URL"]})

          Trigger: `{os.environ["REASON"]}`
          Outcome: `{os.environ["OUTCOME"]}`

          Moeglicherweise Guard-Rail-Violation (zu viele Files, unrelated paths)
          oder post-fix Check rot. Worktree wurde zurueckgerollt —
          kein Commit pushed. Bitte Log in den [Run-Details]({os.environ["RUN_URL"]}) pruefen.""")
          PY
          )
          fi
          gh pr comment "$PR_NUMBER" --body "$body"
