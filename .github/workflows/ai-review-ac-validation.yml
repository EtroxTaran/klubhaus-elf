---
# ai-review-template-version: 0.1.1
# NOTE: neuer Workflow (Stage 5), erstellt 2026-04-20
# Wave 5 — migrated to ai-review CLI 2026-04-20:
#   Interim python3 -c Inline-Block ersetzt durch ai-review ac-validate.
#   Datenbeschaffung (PR-Body, Issue-Bodies, Diff) via gh CLI + jq in Shell.
#   Commit-Status und PR-Comment-Posting bleibt in Shell (nicht Teil der CLI).

name: AI Review — AC Validation (Stage 5)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AI_REVIEW_DISPATCH_URL: ${{ vars.AI_REVIEW_DISPATCH_URL || secrets.AI_REVIEW_DISPATCH_URL ||
    'http://127.0.0.1:5680/webhook/ai-review-dispatch' }}
  AI_REVIEW_METRICS_PATH: ${{ vars.AI_REVIEW_METRICS_PATH ||
    format('/home/clawd/.local/state/ai-review/metrics/{0}.jsonl', github.repository) }}

# Stage 5: Acceptance-Criteria-Validation.
# Prüft ob die PR die Gherkin-ACs aus dem verlinkten Issue abdeckt.
# Fail-Closed: kein verlinktes Issue oder keine ACs → score niedrig, status=failure.
# Schreibt Commit-Status `ai-review/ac-validation`, der vom Consensus-Aggregator
# aggregiert wird.
#
# Trigger: pull_request + edited (damit Body-Änderungen mit neuen Issue-Refs
# sofort re-validiert werden — kein neuer Commit nötig).

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

concurrency:
  group: ai-review-ac-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read # Issue-Bodies fuer Gherkin-ACs lesen
  pull-requests: write # Sticky-Comment mit AC-Coverage-Report
  statuses: write # Commit-status ai-review/ac-validation

jobs:
  ac-validation:
    # Skip dependabot/dependency-bump PRs: they have no linked issue or acceptance
    # criteria by nature, so AC-Validation only produces noise ("AC-Validation failed").
    if: github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ${{ fromJSON(vars.AI_REVIEW_STAGE_RUNS_ON || '["self-hosted","r2d2","ai-review"]') }}
    timeout-minutes: 15
    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Bootstrap runner PATH
        run: |
          echo "/usr/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install ai-review-pipeline
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Consumer repos never install ai-review-pipeline from the PR worktree on a
          # pull_request self-hosted runner. The central pipeline repo may dogfood
          # its local package only for same-repo branches, never for forks.
          if [ "${{ github.repository }}" = "EtroxTaran/x-ai-stack" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            pip install -e packages/ai-review-pipeline
          else
            retry_ai_review_install() {
              local attempt=1
              local max_attempts=3
              local delay=5
              until "$@"; do
                local status=$?
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "::error::command failed after ${attempt} attempts: $*"
                  return "$status"
                fi
                echo "command failed (attempt ${attempt}/${max_attempts}); retrying in ${delay}s: $*"
                sleep "$delay"
                attempt=$((attempt + 1))
                delay=$((delay * 2))
              done
            }
            tmp_pipeline="$(mktemp -d)"
            retry_ai_review_install gh repo clone EtroxTaran/x-ai-stack "$tmp_pipeline" -- --depth 1 --branch main
            retry_ai_review_install pip install "$tmp_pipeline/packages/ai-review-pipeline"
          fi

      - name: Fetch PR body + linked issues + diff into temp files
        id: fetch_data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          WORKDIR=$(mktemp -d)
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"

          # PR-Body und Files holen. Issue-Links werden aus dem Body geparst,
          # weil ältere gh-Versionen `closingIssuesReferences` nicht kennen.
          gh pr view "$PR_NUMBER" --json body,files \
            > "$WORKDIR/pr_meta.json"

          # PR-Body in eigene Datei schreiben
          jq -r '.body // ""' "$WORKDIR/pr_meta.json" > "$WORKDIR/pr_body.txt"

          # Geänderte Files als komma-separierte Liste
          jq -r '[.files[].path] | join(",")' "$WORKDIR/pr_meta.json" \
            > "$WORKDIR/changed_files.txt"
          CHANGED_FILES=$(cat "$WORKDIR/changed_files.txt")
          echo "changed_files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"

          # Diff (cap 300k chars): AC evidence can live in test files late in large PRs.
          # Fail closed when GitHub cannot provide the diff; empty evidence would make
          # AC validation look complete while hiding an API/auth problem.
          if ! gh pr diff "$PR_NUMBER" > "$WORKDIR/pr_diff.full"; then
            echo "failed to fetch PR diff for AC validation" >&2
            exit 1
          fi
          head -c 300000 "$WORKDIR/pr_diff.full" > "$WORKDIR/pr_diff.txt"
          rm -f "$WORKDIR/pr_diff.full"

          # Linked-Issues-JSON aufbauen: { "N": ["issue body text"] }
          ISSUE_NUMS=$(python3 - "$WORKDIR/pr_body.txt" <<'PY'
          import re
          import sys

          body = open(sys.argv[1], encoding="utf-8").read()
          matches = re.findall(
              r"(?im)\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|refs?)\s+#(\d+)",
              body,
          )
          print("\n".join(dict.fromkeys(matches)))
          PY
          )
          echo "{}" > "$WORKDIR/linked_issues.json"
          for ISSUE_NUM in $ISSUE_NUMS; do
            ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --json body --jq '.body // ""' 2>/dev/null || echo "")
            # JSON-sicher escapen via python3 (einzeiler — keine Pipeline-Abhängigkeit)
            python3 -c "
          import json, sys
          current = json.load(open('$WORKDIR/linked_issues.json'))
          current[str($ISSUE_NUM)] = [sys.argv[1]]
          json.dump(current, open('$WORKDIR/linked_issues.json', 'w'))
          " "$ISSUE_BODY"
          done

      - name: Run Stage 5 — AC Coverage Validation
        id: ac_validation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          # ANTHROPIC_API_KEY: Runner-OAuth-Store auf r2d2 liefert den Key.
          # Falls Consumer-Repo keinen self-hosted-Runner mit OAuth nutzt:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORKDIR: ${{ steps.fetch_data.outputs.workdir }}
          CHANGED_FILES: ${{ steps.fetch_data.outputs.changed_files }}
        run: |
          set -euo pipefail

          # ai-review ac-validate aufrufen; stdout in Datei für spätere Auswertung
          set +e
          ai-review ac-validate \
            --pr-body-file       "$WORKDIR/pr_body.txt" \
            --linked-issues-file "$WORKDIR/linked_issues.json" \
            --changed-files      "$CHANGED_FILES" \
            --diff-file          "$WORKDIR/pr_diff.txt" \
            > "$WORKDIR/ac_output.txt" 2>&1
          AC_EXIT=$?
          set -e

          cat "$WORKDIR/ac_output.txt"

          # Score + Confidence aus der Ausgabe parsen
          # Format: "✅ AC-Validation: score=X/10, confidence=Y.YY, waived=Z"
          parsed=$(python3 - "$WORKDIR/ac_output.txt" <<'PY'
          import re
          import sys

          output = open(sys.argv[1], encoding="utf-8", errors="replace").read()
          score = re.search(r"score=(\d+)", output)
          confidence = re.search(r"confidence=([0-9.]+)", output)
          score_value = int(score.group(1)) if score else 0
          confidence_value = float(confidence.group(1)) if confidence else 0.0
          print(f"{score_value} {confidence_value * 100:.0f}")
          PY
          )
          read -r SCORE CONFIDENCE_PERCENT <<< "$parsed"

          # State aus Score ableiten (spiegelt _handle_ac_validate-Logik)
          if   [ "$SCORE" -ge 8 ]; then STATE="success"
          elif [ "$SCORE" -ge 5 ]; then STATE="pending"   # soft — Consensus fragt nach
          else                          STATE="failure"
          fi

          SUMMARY="AC-Coverage score ${SCORE}/10 (confidence ${CONFIDENCE_PERCENT}%)"
          echo "AC-Validation: $STATE — $SUMMARY"

          echo "state=$STATE"       >> "$GITHUB_OUTPUT"
          echo "score=$SCORE"       >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY"   >> "$GITHUB_OUTPUT"
          echo "exit_code=$AC_EXIT" >> "$GITHUB_OUTPUT"

      - name: Set commit status ai-review/ac-validation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          STATE: ${{ steps.ac_validation.outputs.state }}
          SUMMARY: ${{ steps.ac_validation.outputs.summary }}
        run: |
          set -euo pipefail
          TARGET_URL="${GITHUB_SERVER_URL}/${{ github.repository }}/actions/runs/${GITHUB_RUN_ID}"
          gh api "repos/${{ github.repository }}/statuses/$PR_HEAD_SHA" \
            -f state="$STATE" \
            -f context="ai-review/ac-validation" \
            -f description="${SUMMARY:0:140}" \
            -f target_url="$TARGET_URL"
          echo "Commit-Status gesetzt: $STATE — $SUMMARY"

      - name: Post AC-Validation report as PR comment (failure/pending only)
        if: steps.ac_validation.outputs.state != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STATE: ${{ steps.ac_validation.outputs.state }}
          SCORE: ${{ steps.ac_validation.outputs.score }}
          WORKDIR: ${{ steps.fetch_data.outputs.workdir }}
        run: |
          set -euo pipefail

          # Comment-Body via Python bauen: Variablen werden gesetzt, Findings
          # werden als Daten behandelt und koennen keine Shell-Expansion ausloesen.
          BODY=$(python3 <<'PY'
          import os
          from pathlib import Path

          output = Path(os.environ["WORKDIR"], "ac_output.txt").read_text(encoding="utf-8")
          findings = "\n".join(output.splitlines()[1:])
          print(f"""<!-- ai-review-ac-validation -->
          ## AC-Validation Report

          **Score:** {os.environ["SCORE"]}/10 | **Status:** {os.environ["STATE"]}

          {findings}

          _Waiver: `/ai-review ac-waiver <reason ≥30 chars>`_
          """)
          PY
          )

          # Existierenden AC-Comment updaten oder neu posten
          EXISTING_ID=$(gh api \
            "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("ai-review-ac-validation")) | .id' \
            | head -n1 || echo "")

          if [ -n "$EXISTING_ID" ]; then
            gh api -X PATCH \
              "repos/${{ github.repository }}/issues/comments/$EXISTING_ID" \
              -f body="$BODY" >/dev/null
            echo "AC-Validation-Comment aktualisiert (id=$EXISTING_ID)"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
            echo "AC-Validation-Comment neu gepostet"
          fi

      - name: Fail job when AC-Validation failed
        if: steps.ac_validation.outputs.state == 'failure'
        run: |
          echo "AC-Validation failed; commit status was already published."
          exit 1

      - name: Cleanup temp files
        if: always()
        env:
          WORKDIR: ${{ steps.fetch_data.outputs.workdir }}
        run: |
          [ -n "$WORKDIR" ] && rm -rf "$WORKDIR" || true
