name: Auto-Fix-Loop

# ai-review-template-version: 0.1.1
# Auto-Re-Trigger nach failed-pipeline (Phase 1.3.b).
#
# Wenn die Pipeline rot ist UND der letzte Commit von github-actions[bot]
# kam (also vom Auto-Fix-Push), dispatcht dieser Workflow automatisch eine
# weitere Auto-Fix-Iteration. Das Iteration-Limit aus Phase 1.3 begrenzt
# die Schleife (siehe ai_review_pipeline/auto_fix.py — _COUNTER_MARKER,
# AUTO_FIX_MAX_ITERATIONS).
#
# Was den Re-Trigger BLOCKIERT:
# - consensus.state != failure (Pipeline grün oder pending)
# - Letzter Commit kommt nicht von github-actions[bot] (User hat manuell
#   gepusht — Auto-Fix-Loop soll Menschen nicht überholen)
# - PR ist draft (Owner experimentiert, nicht reviewbar)
# - Counter im Sticky-Comment hat AUTO_FIX_MAX_ITERATIONS erreicht
#   (run_auto_fix returnt circuit_breaker und postet Eskalations-Comment)
#
# WICHTIG: dieser Workflow startet KEINEN eigenen Fix — er dispatcht nur
# `ai-review-auto-fix.yml`, der sämtliche Guard-Rails (Path-Whitelist,
# Test-Gates, Iteration-Limit) selber durchsetzt.

on:
  status: {}

permissions:
  contents: read
  pull-requests: write
  actions: write
  statuses: read

jobs:
  retrigger-auto-fix:
    name: Retrigger auto-fix on failed pipeline (bot-only)
    runs-on: ${{ fromJSON(vars.AI_REVIEW_STAGE_RUNS_ON || '["self-hosted","r2d2","ai-review"]') }}
    if: |
      github.event.context == 'ai-review/consensus'
      && github.event.state == 'failure'
    steps:
      - name: Find PR for this commit
        id: pr
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SHA: ${{ github.event.sha }}
        run: |
          set -euo pipefail
          pr_json=$(gh api "repos/$GH_REPO/commits/$SHA/pulls" \
            -H "Accept: application/vnd.github+json")
          # Pick first open, non-draft PR
          num=$(printf '%s' "$pr_json" \
            | jq -r '[.[] | select(.state=="open" and .draft==false)][0].number // empty')
          if [ -z "$num" ]; then
            echo "::notice::No open non-draft PR for $SHA — skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$num" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Read commit author + message
        id: commit
        if: steps.pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SHA: ${{ github.event.sha }}
        run: |
          set -euo pipefail
          # Author login as recorded by GitHub (committer_login is not always set
          # for bot-pushes — fall back to author.name patterns).
          meta=$(gh api "repos/$GH_REPO/commits/$SHA" -H "Accept: application/vnd.github+json")
          author_login=$(printf '%s' "$meta" | jq -r '.author.login // empty')
          committer_login=$(printf '%s' "$meta" | jq -r '.committer.login // empty')
          author_name=$(printf '%s' "$meta" | jq -r '.commit.author.name // empty')
          msg=$(printf '%s' "$meta" | jq -r '.commit.message // empty' | head -1)
          echo "author_login=$author_login" >> "$GITHUB_OUTPUT"
          echo "committer_login=$committer_login" >> "$GITHUB_OUTPUT"
          echo "author_name=$author_name" >> "$GITHUB_OUTPUT"
          # Make first-line of msg a single output (escape % and newline)
          {
            echo "msg<<COMMIT_MSG_EOF"
            printf '%s\n' "$msg"
            echo "COMMIT_MSG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Decide whether to retrigger
        id: gate
        if: steps.pr.outputs.found == 'true'
        env:
          AUTHOR_LOGIN: ${{ steps.commit.outputs.author_login }}
          COMMITTER_LOGIN: ${{ steps.commit.outputs.committer_login }}
          AUTHOR_NAME: ${{ steps.commit.outputs.author_name }}
          COMMIT_MSG: ${{ steps.commit.outputs.msg }}
        run: |
          set -euo pipefail
          # Bot-detection: github-actions[bot] login OR commit-message starts
          # with [ai-fix] (which run_auto_fix uses for its commits).
          retrigger=false
          if [ "$AUTHOR_LOGIN" = "github-actions[bot]" ] \
              || [ "$COMMITTER_LOGIN" = "github-actions[bot]" ] \
              || [ "$AUTHOR_NAME" = "github-actions[bot]" ]; then
            retrigger=true
            reason="last commit by github-actions[bot]"
          fi
          case "$COMMIT_MSG" in
            \[ai-fix\]*) retrigger=true; reason="commit msg starts with [ai-fix]" ;;
          esac
          if [ "$retrigger" = "true" ]; then
            echo "::notice::auto-fix loop will retrigger ($reason)"
            echo "retrigger=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::skip — last commit is human ($AUTHOR_NAME / $AUTHOR_LOGIN)"
            echo "retrigger=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch ai-review-auto-fix.yml
        if: steps.gate.outputs.retrigger == 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          # `reason=auto-loop` makes the run distinguishable from manual retries
          # in metrics.jsonl + Discord notifications. The dispatched workflow
          # reads the iteration-counter sticky and circuit-breaks at the limit.
          gh workflow run ai-review-auto-fix.yml \
            --field "pr_number=$PR" \
            --field "reason=auto-loop" \
            --field "context_hint=re-triggered after failed pipeline on bot commit"
          echo "::notice::dispatched ai-review-auto-fix.yml for PR #$PR (reason=auto-loop)"
