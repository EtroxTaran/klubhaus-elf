---
# ai-review-template-version: 0.1.1
# NOTE: parametrized from ai-portal@2026-04-20
# Changes:
#   - python3 -m scripts.ai-review.design_review → python -m ai_review_pipeline.stages.design_review
#   - TELEGRAM_NOTIFICATION_WEBHOOK → DISCORD_NOTIFICATION_WEBHOOK
#   - github.repository bleibt dynamisch
#   - Preflight laeuft im ai-review CLI; Consumer-Repos brauchen kein separates Preflight-Skript
#   - Kein pull_request_target verwendet (war schon pull_request — konform)
#   - Modell in Script-Seite: claude-opus-4-8 (Rule 11 — aktuell halten)
# Wave 5 (2026-04-20):
#   - python -m ai_review_pipeline.stages.design_review → ai-review stage design
#   - Setup Python + token-authenticated central checkout + local pip install Steps ergänzt

name: AI Design Review (Stage 3)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AI_REVIEW_DISPATCH_URL: ${{ vars.AI_REVIEW_DISPATCH_URL || secrets.AI_REVIEW_DISPATCH_URL ||
    'http://127.0.0.1:5680/webhook/ai-review-dispatch' }}
  AI_REVIEW_METRICS_PATH: ${{ vars.AI_REVIEW_METRICS_PATH ||
    format('/home/clawd/.local/state/ai-review/metrics/{0}.jsonl', github.repository) }}

# Stage 3: Claude Opus 4.7, DESIGN.md-Konformität. Skippt sich selbst
# wenn keine UI-Files im Diff sind (path-filter im Script, nicht hier im YAML,
# damit consensus.py den "skipped"-State sauber aus der Status-Description
# parsen kann).
#
# Läuft PARALLEL zu Stage 1 + 2, direkt auf pull_request.synchronize.
# design_review.py ist `review-only` (kein Fix-Loop) — kein Race mit Stage 1
# Fix-Commits.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ai-design-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  statuses: write
  checks: write
  actions: read

jobs:
  design-review:
    if: github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ${{ fromJSON(vars.AI_REVIEW_STAGE_RUNS_ON || '["self-hosted","r2d2","ai-review"]') }}
    timeout-minutes: 15
    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Bootstrap runner PATH
        run: |
          echo "/usr/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install ai-review-pipeline
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Consumer repos never install ai-review-pipeline from the PR worktree on a
          # pull_request self-hosted runner. The central pipeline repo may dogfood
          # its local package only for same-repo branches, never for forks.
          if [ "${{ github.repository }}" = "EtroxTaran/x-ai-stack" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            pip install -e packages/ai-review-pipeline
          else
            retry_ai_review_install() {
              local attempt=1
              local max_attempts=3
              local delay=5
              until "$@"; do
                local status=$?
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "::error::command failed after ${attempt} attempts: $*"
                  return "$status"
                fi
                echo "command failed (attempt ${attempt}/${max_attempts}); retrying in ${delay}s: $*"
                sleep "$delay"
                attempt=$((attempt + 1))
                delay=$((delay * 2))
              done
            }
            tmp_pipeline="$(mktemp -d)"
            retry_ai_review_install gh repo clone EtroxTaran/x-ai-stack "$tmp_pipeline" -- --depth 1 --branch main
            retry_ai_review_install pip install "$tmp_pipeline/packages/ai-review-pipeline"
          fi

      - name: Preflight — CLI OAuth presence
        run: echo "preflight skipped; ai-review stage runs with --skip-preflight"

      - name: Run Stage 3 — Claude Opus design review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          DISCORD_NOTIFICATION_WEBHOOK: ${{ secrets.DISCORD_NOTIFICATION_WEBHOOK }}
        run: |
          # TELEGRAM_OPS_BOT_TOKEN / TELEGRAM_OPS_CHAT_ID / TELEGRAM_OPS_TOPIC_AI_REVIEW: bb8-local (gateway.env),
          # never on GitHub
          set -a; source "$HOME/.config/hermes/gateway.env" 2>/dev/null || true; set +a
          ai-review stage design \
            --pr ${{ github.event.pull_request.number }} \
            --max-iterations 2 \
            --skip-preflight \
            --skip-fix-loop
