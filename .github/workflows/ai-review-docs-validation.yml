---
# ai-review-template-version: 0.1.1
# Deterministic Project-Wall documentation-impact gate (Issue #716).

name: AI Review — Documentation Validation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ai-review-docs-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  gate:
    if: github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ${{ fromJSON(vars.AI_REVIEW_STAGE_RUNS_ON || '["self-hosted","r2d2","ai-review"]') }}
    timeout-minutes: 5
    outputs:
      enabled: ${{ steps.config.outputs.enabled }}
    steps:
      - name: Checkout PR head config
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          sparse-checkout: .ai-review/config.yaml
          sparse-checkout-cone-mode: false
          fetch-depth: 1
          path: .docs-validation-gate

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Read docs_validation.enabled
        id: config
        env:
          CONFIG_PATH: .docs-validation-gate/.ai-review/config.yaml
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyyaml
          enabled=$(CONFIG_PATH="$CONFIG_PATH" python3 <<'PY'
          import os
          import yaml

          if not os.path.isfile(os.environ["CONFIG_PATH"]):
              print("false")
              raise SystemExit(0)
          with open(os.environ["CONFIG_PATH"], encoding="utf-8") as handle:
              config = yaml.safe_load(handle) or {}
          stages = config.get("stages") if isinstance(config, dict) else {}
          settings = stages.get("docs_validation") if isinstance(stages, dict) else {}
          print("true" if isinstance(settings, dict) and settings.get("enabled") is True else "false")
          PY
          )
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Post skip status when Documentation Validation is disabled
        if: steps.config.outputs.enabled != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/$PR_HEAD_SHA" \
            -f state=success \
            -f context="ai-review/docs-validation" \
            -f description="skipped: config-disabled — stage disabled in config"

  docs-validation:
    needs: gate
    if: ${{ github.event.pull_request.draft == false && needs.gate.outputs.enabled == 'true' }}
    runs-on: ${{ fromJSON(vars.AI_REVIEW_STAGE_RUNS_ON || '["self-hosted","r2d2","ai-review"]') }}
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install ai-review-pipeline
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.repository }}" = "EtroxTaran/x-ai-stack" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            pip install -e packages/ai-review-pipeline
          else
            retry_ai_review_install() {
              local attempt=1
              local max_attempts=3
              local delay=5
              until "$@"; do
                local status=$?
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "::error::command failed after ${attempt} attempts: $*"
                  return "$status"
                fi
                sleep "$delay"
                attempt=$((attempt + 1))
                delay=$((delay * 2))
              done
            }
            tmp_pipeline="$(mktemp -d)"
            retry_ai_review_install gh repo clone EtroxTaran/x-ai-stack "$tmp_pipeline" -- --depth 1 --branch main
            retry_ai_review_install pip install "$tmp_pipeline/packages/ai-review-pipeline"
          fi

      - name: Run deterministic documentation validation
        id: docs_validation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          METRICS_PATH: ${{ runner.temp }}/ai-review-docs-metrics.jsonl
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          gh pr diff "$PR_NUMBER" --name-only > "$workdir/changed-files.txt"

          set +e
          ai-review docs-validate \
            --root . \
            --changed-files-file "$workdir/changed-files.txt" \
            --metrics-path "$METRICS_PATH" \
            --json > "$workdir/result.json"
          exit_code=$?
          set -e

          cat "$workdir/result.json"
          state="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["state"])' "$workdir/result.json")"
          if [ "$exit_code" -eq 2 ]; then
            state="error"
          fi
          description="$(python3 - "$workdir/result.json" <<'PY'
          import json
          import sys

          result = json.load(open(sys.argv[1], encoding="utf-8"))
          findings = result.get("findings") or []
          if findings:
              print(findings[0].get("message", "documentation update required")[:140])
          else:
              topics = ", ".join(result.get("satisfied_topics") or []) or "no governed topics"
              print(f"documentation impact satisfied: {topics}"[:140])
          PY
          )"
          {
            echo "state=$state"
            echo "description=$description"
            echo "result=$workdir/result.json"
          } >> "$GITHUB_OUTPUT"

      - name: Set commit status ai-review/docs-validation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          STATE: ${{ steps.docs_validation.outputs.state }}
          DESCRIPTION: ${{ steps.docs_validation.outputs.description }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/$PR_HEAD_SHA" \
            -f state="$STATE" \
            -f context="ai-review/docs-validation" \
            -f description="${DESCRIPTION:0:140}"

      - name: Fail job when Documentation Validation failed
        if: steps.docs_validation.outputs.state != 'success'
        run: exit 1
