name: docs-check

# Validates the Obsidian vault: frontmatter, wikilinks, no orphans, no secrets,
# ADRs listed in the Decision-Log. Thin trigger only — the logic lives in the
# portable scripts/docs-check.mjs (run locally with `pnpm docs:check`). See ADR-0044.
# No paths filter on purpose: this is a required check, so it must report on every PR.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate vault (pnpm docs:check)
        run: node scripts/docs-check.mjs
