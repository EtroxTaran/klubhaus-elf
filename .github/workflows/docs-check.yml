name: docs-check

# Validates the Obsidian vault: frontmatter, wikilinks, no orphans, no secrets,
# ADRs listed in the Decision-Log (scripts/docs-check.mjs, `pnpm docs:check`) +
# status-SSOT drift (scripts/status-consistency-check.mjs, `pnpm docs:status-check`,
# ADR-0092/FMX-143). Thin trigger only — the logic lives in the portable scripts. See ADR-0044.
# No paths filter on purpose: this is a required check, so it must report on every PR.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  docs-check:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate vault (pnpm docs:check)
        run: node scripts/docs-check.mjs
      - name: Status-consistency check (frontmatter SSOT, ADR-0092 / FMX-143)
        run: node scripts/status-consistency-check.mjs
      - name: Enforce bb8 runner policy
        run: node scripts/bb8-runner-policy.test.mjs
      - name: Verify managed worktree preview ports
        run: pnpm ci:worktree-port
