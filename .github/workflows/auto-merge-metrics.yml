name: Auto-Merge-Metrics

# ai-review-template-version: 0.1.1
# Phase C.2 — Post-Merge-Telemetrie. Wenn ein PR gemerged wird, schreibt
# dieser Workflow eine strukturierte Zeile nach metrics.jsonl, damit der
# 30-Tage-Audit (ADR-005 Verifikations-Schritt) und die wöchentliche
# Discord-Zusammenfassung (Phase C.3) die Daten haben.
#
# Was wird geloggt:
#   - timestamp (ISO-8601 UTC)
#   - event_type: "auto_merge"
#   - repo, pr_number, pr_title
#   - merge_sha, base_sha
#   - label_path: "auto-merge-approved" | "merge-approved-by-nico" | "manual"
#     → unterscheidet Auto-Pfad vs. Nicos manuell + alt-Label-Pfad vs. ohne Label
#   - merged_at (timestamp aus PR-Event)
#   - merged_by (User-Login)
#
# Wo wird geloggt:
#   AI_REVIEW_METRICS_PATH (zentral pro Repo auf dem Self-Hosted-Runner)
#   Default: /home/clawd/.local/state/ai-review/metrics/<owner>/<repo>.jsonl
#
# Fail-open: jeder Schritt schlägt nicht den Pipeline-Status — Telemetrie
# darf den Merge selbst nicht torpedieren.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  log-merge:
    name: Append auto-merge telemetry to metrics.jsonl
    runs-on: ${{ fromJSON(vars.AI_REVIEW_STAGE_RUNS_ON || '["self-hosted","r2d2","ai-review"]') }}
    if: github.event.pull_request.merged == true
    steps:
      - name: Bootstrap runner PATH
        run: |
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Determine label-path
        id: label
        env:
          LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          # Walk the labels JSON array; pick the most specific.
          # Order: auto-merge-approved (Phase 1) > merge-approved-by-nico (legacy) > manual (none)
          path="manual"
          if printf '%s' "$LABELS_JSON" | grep -q '"auto-merge-approved"'; then
            path="auto-merge-approved"
          elif printf '%s' "$LABELS_JSON" | grep -q '"merge-approved-by-nico"'; then
            path="merge-approved-by-nico"
          fi
          echo "value=$path" >> "$GITHUB_OUTPUT"

      - name: Append metrics line
        env:
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          LABEL_PATH: ${{ steps.label.outputs.value }}
          AI_REVIEW_METRICS_PATH: ${{ vars.AI_REVIEW_METRICS_PATH }}
        run: |
          set -euo pipefail
          # Resolve target path (env override > default per-repo path)
          if [ -n "${AI_REVIEW_METRICS_PATH:-}" ]; then
            target="$AI_REVIEW_METRICS_PATH"
          else
            target="$HOME/.local/state/ai-review/metrics/${REPO}.jsonl"
          fi
          mkdir -p "$(dirname "$target")"

          # Build line via python — robust JSON encoding for titles with quotes.
          python3 - "$target" <<'PY'
          import json, os, sys
          from datetime import datetime, timezone
          target = sys.argv[1]
          rec = {
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S.%fZ"),
              "event_type": "auto_merge",
              "repo": os.environ.get("REPO", ""),
              "pr_number": int(os.environ.get("PR_NUMBER") or 0),
              "pr_title": os.environ.get("PR_TITLE", ""),
              "merge_sha": os.environ.get("MERGE_SHA", ""),
              "base_sha": os.environ.get("BASE_SHA", ""),
              "merged_at": os.environ.get("MERGED_AT", ""),
              "merged_by": os.environ.get("MERGED_BY", ""),
              "label_path": os.environ.get("LABEL_PATH", "manual"),
          }
          with open(target, "a", encoding="utf-8") as fh:
              fh.write(json.dumps(rec, separators=(",", ":"), sort_keys=True))
              fh.write("\n")
          print(f"::notice::auto_merge telemetry appended to {target}")
          PY
        continue-on-error: true
