---
# ai-review-template-version: 0.1.1
# NOTE: parametrized from ai-portal@2026-04-20
# Changes:
#   - python3 -m scripts.ai-review.cursor_review → python -m ai_review_pipeline.stages.cursor_review
#   - TELEGRAM_NOTIFICATION_WEBHOOK → DISCORD_NOTIFICATION_WEBHOOK
#   - github.repository bleibt dynamisch
#   - Preflight laeuft im ai-review CLI; Consumer-Repos brauchen kein separates Preflight-Skript
#   - Kein pull_request_target verwendet (war schon pull_request — konform)
# Wave 5 (2026-04-20):
#   - python -m ai_review_pipeline.stages.cursor_review → ai-review stage cursor-review
#   - Setup Python + token-authenticated central checkout + local pip install Steps ergänzt
# Cursor-Retire (2026-06-18, Issue #87/#128):
#   - Cheap `gate`-Job (runs-on AI_REVIEW_STAGE_RUNS_ON) liest .ai-review/config.yaml cursor_review.enabled.
#   - Bei enabled:false postet der gate-Job direkt den ai-review/code-cursor Skip-Status
#     (success, "stage disabled in config") — der teure self-hosted `cursor-review`-Job
#     startet dann GAR NICHT (kein checkout + pip auf dem einzigen self-hosted Runner).
#   - So brennt das stillgelegte Cursor-Stage keine self-hosted Runner-Zeit mehr,
#     bleibt aber als expliziter Skip-Status sichtbar (resolve_code_consensus-kompatibel).

name: AI Code Review (Stage 1b — Cursor)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AI_REVIEW_DISPATCH_URL: ${{ vars.AI_REVIEW_DISPATCH_URL || secrets.AI_REVIEW_DISPATCH_URL ||
    'http://127.0.0.1:5680/webhook/ai-review-dispatch' }}
  AI_REVIEW_METRICS_PATH: ${{ vars.AI_REVIEW_METRICS_PATH ||
    format('/home/clawd/.local/state/ai-review/metrics/{0}.jsonl', github.repository) }}

# Stage 1b: Second opinion via Cursor Agent CLI (composer-2).
# Läuft PARALLEL zu Stage 1 (Codex) auf pull_request.synchronize — kein
# workflow_run-chain. Gleiche Architektur-Wahl wie Security+Design:
# kein Fix-Loop, Findings eskalieren via Consensus + Nico-Review.
#
# Schreibt Commit-Status `ai-review/code-cursor`, den der Consensus-Aggregator
# via `resolve_code_consensus` mit `ai-review/code` (Codex) zu einem virtuellen
# code-consensus verschmilzt.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ai-cursor-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  statuses: write
  checks: write

jobs:
  # Billiger Gate-Job: liest .ai-review/config.yaml und entscheidet, ob das
  # teure self-hosted Cursor-Stage ueberhaupt laufen darf. Bei enabled:false
  # postet er selbst den Skip-Status — der self-hosted Job wird uebersprungen.
  gate:
    if: github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ${{ fromJSON(vars.AI_REVIEW_STAGE_RUNS_ON || '["self-hosted","r2d2","ai-review"]') }}
    timeout-minutes: 5
    outputs:
      enabled: ${{ steps.config.outputs.enabled }}
    steps:
      - name: Checkout PR head (config only)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          sparse-checkout: |
            .ai-review/config.yaml
          sparse-checkout-cone-mode: false
          fetch-depth: 1
          # In ein isoliertes Unterverzeichnis checkouten: auf dem persistenten
          # self-hosted Runner darf dieser sparse-Checkout NICHT den geteilten
          # Workspace-Root sparse hinterlassen (sonst finden Folgejobs nur ein
          # Teil-Tree -> "No pnpm version"/"tests not found"). path= isoliert ihn.
          path: .cursor-gate

      # setup-python liefert pip aus dem Tool-Cache — der bare Runner hat
      # kein System-pip (python3-pip-Live-Apply via Phase 65 ist gated, #270).
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Read cursor_review.enabled from .ai-review/config.yaml
        id: config
        env:
          CONFIG_PATH: .cursor-gate/.ai-review/config.yaml
        # The python3 -c one-liner below is kept on a single physical line on purpose:
        # a multi-line python3 -c string reads as broken (indented top-level
        # statements) to static analysis even though YAML block-scalar
        # de-indentation makes it valid at runtime.
        # yamllint disable rule:line-length
        run: |
          set -euo pipefail
          ENABLED="true"
          if [ -f "$CONFIG_PATH" ]; then
            # cursor_review.enabled: false => disabled. Fehlt der Eintrag, gilt enabled (fail-open).
            python3 -m pip install --quiet pyyaml >/dev/null 2>&1 || true
            ENABLED=$(CONFIG_PATH="$CONFIG_PATH" python3 -c 'import os, yaml; d = yaml.safe_load(open(os.environ["CONFIG_PATH"], encoding="utf-8")) or {}; s = (d.get("stages") or {}) if isinstance(d, dict) else {}; c = s.get("cursor_review") or {}; print("false" if (isinstance(c, dict) and c.get("enabled") is False) else "true")')
          fi
          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"
          echo "cursor_review.enabled resolved to: $ENABLED"
        # yamllint enable rule:line-length

      - name: Post skip status when Cursor stage is disabled in config
        if: steps.config.outputs.enabled != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          TARGET_URL="${GITHUB_SERVER_URL}/${{ github.repository }}/actions/runs/${GITHUB_RUN_ID}"
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=success \
            -f context="ai-review/code-cursor" \
            -f description="skipped: config-disabled — stage disabled in config" \
            -f target_url="$TARGET_URL"

  cursor-review:
    needs: gate
    # Nur wenn Cursor in der Config aktiviert ist — sonst brennt der teure
    # self-hosted Runner keine Zeit (Issue #128). Der gate-Job hat dann bereits
    # den Skip-Status gepostet.
    if: ${{ github.event.pull_request.draft == false && needs.gate.outputs.enabled == 'true' }}
    runs-on: ${{ fromJSON(vars.AI_REVIEW_STAGE_RUNS_ON || '["self-hosted","r2d2","ai-review"]') }}
    timeout-minutes: 20
    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Bootstrap runner PATH
        run: |
          echo "/usr/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install ai-review-pipeline
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Consumer repos never install ai-review-pipeline from the PR worktree on a
          # pull_request self-hosted runner. The central pipeline repo may dogfood
          # its local package only for same-repo branches, never for forks.
          if [ "${{ github.repository }}" = "EtroxTaran/x-ai-stack" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            pip install -e packages/ai-review-pipeline
          else
            retry_ai_review_install() {
              local attempt=1
              local max_attempts=3
              local delay=5
              until "$@"; do
                local status=$?
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "::error::command failed after ${attempt} attempts: $*"
                  return "$status"
                fi
                echo "command failed (attempt ${attempt}/${max_attempts}); retrying in ${delay}s: $*"
                sleep "$delay"
                attempt=$((attempt + 1))
                delay=$((delay * 2))
              done
            }
            tmp_pipeline="$(mktemp -d)"
            retry_ai_review_install gh repo clone EtroxTaran/x-ai-stack "$tmp_pipeline" -- --depth 1 --branch main
            retry_ai_review_install pip install "$tmp_pipeline/packages/ai-review-pipeline"
          fi

      - name: Preflight — CLI OAuth presence
        run: echo "preflight skipped; ai-review stage runs with --skip-preflight"

      - name: Run Stage 1b — Cursor code review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          DISCORD_NOTIFICATION_WEBHOOK: ${{ secrets.DISCORD_NOTIFICATION_WEBHOOK }}
        run: |
          # TELEGRAM_OPS_BOT_TOKEN / TELEGRAM_OPS_CHAT_ID / TELEGRAM_OPS_TOPIC_AI_REVIEW: bb8-local (gateway.env),
          # never on GitHub
          set -a; source "$HOME/.config/hermes/gateway.env" 2>/dev/null || true; set +a
          ai-review stage cursor-review \
            --pr ${{ github.event.pull_request.number }} \
            --max-iterations 2 \
            --skip-preflight \
            --skip-fix-loop
