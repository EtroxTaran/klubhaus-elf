name: Auto-PR-Open

# ai-review-template-version: 0.1.1
# Öffnet automatisch einen Pull Request, wenn ein Branch nach
# Konvention `feat/*-issue-N`, `fix/*-issue-N`, `chore/*-issue-N`,
# `refactor/*-issue-N` gepusht wird und noch kein PR offen ist.
#
# Body wird gerendert wie der manuelle pr-open Skill ihn erzeugen würde:
# - Linked Issue: Closes #N
# - Acceptance Criteria Verification: Tabelle aus dem Gherkin-Block des Issues
# - Test Plan: Standard-Block
#
# WAS DEN AUTO-OPEN BLOCKIERT:
# - Branch matcht das Pattern nicht
# - Es existiert bereits ein offener PR für den Branch (Idempotenz)
# - Branch hat keine Issue-Number im Namen
# - User-Override via Commit-Message [skip-auto-pr]
#
# Dieser Workflow ist Template-SoT für `gh ai-review install`. Das Repo
# `ai-engineering-stack` selbst spiegelt diese Datei nach
# `.github/workflows/auto-pr-open.yml`.

on:
  push:
    branches:
      - 'feat/**-issue-*'
      - 'fix/**-issue-*'
      - 'chore/**-issue-*'
      - 'refactor/**-issue-*'

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  open-pr:
    name: Open PR if none exists
    runs-on: ${{ fromJSON(vars.AI_REVIEW_STAGE_RUNS_ON || '["self-hosted","r2d2","ai-review"]') }}
    if: |
      !contains(github.event.head_commit.message, '[skip-auto-pr]')
      && !startsWith(github.event.head_commit.message, 'Merge ')
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.3
        with:
          fetch-depth: 0

      - name: Derive issue number from branch
        id: derive
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          branch="$GITHUB_REF_NAME"
          # Match issue-N at end of branch slug; ignore embedded digits earlier
          n=$(printf '%s\n' "$branch" | grep -oE 'issue-[0-9]+' | head -1 | grep -oE '[0-9]+$' || true)
          if [ -z "$n" ]; then
            echo "::warning::Branch '$branch' contains no 'issue-N' token. Skipping auto-PR."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Derive convcommit prefix (feat/fix/chore/refactor) from branch
          prefix=$(printf '%s\n' "$branch" | grep -oE '^[a-z]+' | head -1)
          echo "issue=$n" >> "$GITHUB_OUTPUT"
          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Check existing PR (idempotence)
        id: existing
        if: steps.derive.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ steps.derive.outputs.branch }}
        run: |
          set -euo pipefail
          count=$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')
          if [ "$count" -gt 0 ]; then
            num=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
            echo "::notice::PR #$num already open for $BRANCH — skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch issue + parse Gherkin
        id: issue
        if: steps.derive.outputs.skip != 'true' && steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ steps.derive.outputs.issue }}
        run: |
          set -euo pipefail
          if ! gh issue view "$ISSUE" --json title,body > /tmp/issue.json 2>/dev/null; then
            echo "::warning::Issue #$ISSUE not found — opening PR with Refs only."
            jq -n --arg n "$ISSUE" '{title:"(no linked issue)", body:""}' > /tmp/issue.json
          fi
          title=$(jq -r '.title' /tmp/issue.json)
          body=$(jq -r '.body' /tmp/issue.json)
          # Extract scenarios from gherkin block (between ```gherkin ... ``` fences).
          # We tolerate missing/multiple gherkin blocks — render MISSING-row in that case.
          python3 - "$body" > /tmp/ac-table.md <<'PY'
          import re, sys
          body = sys.argv[1]
          m = re.search(r"```gherkin\s*\n(.*?)```", body, re.DOTALL | re.IGNORECASE)
          scenarios = []
          if m:
              gherkin = m.group(1)
              # Match lines like "Scenario: AC-1 — title" or "Scenario: title"
              for line in gherkin.splitlines():
                  s = line.strip()
                  if s.lower().startswith("scenario:"):
                      desc = s.split(":", 1)[1].strip()
                      scenarios.append(desc)
          if not scenarios:
              print("_No Gherkin scenarios found in issue. Add ACs before requesting review._")
          else:
              for i, s in enumerate(scenarios, start=1):
                  print(f"- [ ] **AC-{i}**: {s}")
                  print(f"      Verified by: `MISSING — fill before review`")
          PY
          ac_table=$(cat /tmp/ac-table.md)
          # Build conv-commit title — use issue title in lowercase, trimmed to 70-prefix length.
          prefix="${{ steps.derive.outputs.prefix }}"
          short_title=$(printf '%s' "$title" | tr '[:upper:]' '[:lower:]' | head -c 60)
          # Strip leading "feat:" etc. if user already prefixed in issue title
          short_title=$(printf '%s' "$short_title" | sed -E 's/^(feat|fix|chore|refactor):\s*//')
          pr_title="${prefix}: ${short_title}"
          # Truncate to <=70 chars total
          pr_title=$(printf '%s' "$pr_title" | head -c 70)
          {
            echo "title<<EOF"
            echo "$pr_title"
            echo "EOF"
            echo "ac_table<<EOF"
            echo "$ac_table"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Render PR body
        id: body
        if: steps.derive.outputs.skip != 'true' && steps.existing.outputs.exists != 'true'
        env:
          ISSUE: ${{ steps.derive.outputs.issue }}
          AC_TABLE: ${{ steps.issue.outputs.ac_table }}
        run: |
          set -euo pipefail
          {
            echo "## Linked Issue"
            echo
            echo "Closes #$ISSUE"
            echo
            echo "## Acceptance Criteria Verification"
            echo
            printf '%s\n' "$AC_TABLE"
            echo
            echo "_Check each box only after the corresponding test is green on this branch._"
            echo
            echo "## Test Plan"
            echo
            echo "- Unit: \`pnpm test --run\` (or language equivalent)"
            echo "- Typecheck: \`pnpm typecheck\`"
            echo "- Lint: \`pnpm lint\`"
            echo "- E2E: \`pnpm test:e2e\` — routes mocked via \`page.route()\` where external"
            echo "  deps are involved"
            echo
            echo "---"
            echo
            echo "_PR opened by \`auto-pr-open.yml\` on push. Body mirrors the \`pr-open\` skill format._"
          } > /tmp/pr-body.md
          echo "path=/tmp/pr-body.md" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.derive.outputs.skip != 'true' && steps.existing.outputs.exists != 'true'
        env:
          # CROSS_REPO_PAT bevorzugt: GITHUB_TOKEN kann standardmässig keine PRs
          # erstellen, ausser das Repo-Setting "Allow GitHub Actions to create and
          # approve pull requests" ist aktiviert (Settings → Actions → General →
          # Workflow permissions). PAT umgeht das.
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ steps.derive.outputs.branch }}
          TITLE: ${{ steps.issue.outputs.title }}
          BODY_PATH: ${{ steps.body.outputs.path }}
        run: |
          set -euo pipefail
          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body-file "$BODY_PATH"
