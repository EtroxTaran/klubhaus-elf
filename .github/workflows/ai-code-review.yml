---
# ai-review-template-version: 0.1.1
# NOTE: parametrized from ai-portal@2026-04-20
# Changes:
#   - python3 -m scripts.ai-review.code_review → python -m ai_review_pipeline.stages.code_review
#   - TELEGRAM_NOTIFICATION_WEBHOOK → DISCORD_NOTIFICATION_WEBHOOK (Discord-only per Rule)
#   - github.repository bleibt dynamisch (kein hardcoded EtroxTaran/ai-portal)
#   - Preflight laeuft im ai-review CLI; Consumer-Repos brauchen kein separates Preflight-Skript
#   - Kein pull_request_target verwendet (war schon pull_request — konform)
# Wave 5 (2026-04-20):
#   - python -m ai_review_pipeline.stages.code_review → ai-review stage code-review
#   - Setup Python + token-authenticated central checkout + local pip install Steps ergänzt

name: AI Code Review (Stage 1)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AI_REVIEW_DISPATCH_URL: ${{ vars.AI_REVIEW_DISPATCH_URL || secrets.AI_REVIEW_DISPATCH_URL ||
    'http://127.0.0.1:5680/webhook/ai-review-dispatch' }}
  AI_REVIEW_METRICS_PATH: ${{ vars.AI_REVIEW_METRICS_PATH ||
    format('/home/clawd/.local/state/ai-review/metrics/{0}.jsonl', github.repository) }}

# Stage 1 of 5 im AI-Review-Gate. Codex CLI-Default prüft funktionale Korrektheit.
# Läuft auf selbst-gehostetem r2d2-Runner mit OAuth-Credentials aus dem Host-FS
# (keine API-Keys im Repo). Der Workflow schreibt einen Commit-Status
# `ai-review/code`, der vom Consensus-Aggregator ausgewertet wird.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  # Review-only Stage: neuer PR-Head ersetzt alte laufende/queued Reviews.
  # Fixes laufen ueber den separaten Autonomous-Repair-Orchestrator.
  group: ai-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # Sticky comments + review posts
  statuses: write # Commit-status ai-review/code
  checks: write

jobs:
  code-review:
    if: github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ${{ fromJSON(vars.AI_REVIEW_STAGE_RUNS_ON || '["self-hosted","r2d2","ai-review"]') }}
    timeout-minutes: 20
    steps:
      # Fix-Loop-eigene Pushes (Commit-Prefix `[ai-fix] code:`) triggern einen
      # neuen `pull_request.synchronize` — dieser Run würde redundant
      # re-reviewen, was der noch laufende Parent-Run gerade selbst konvergiert.
      # Früh ausgegated, damit wir kein CLI-Budget verbrennen.
      #
      # WICHTIG: Nur die EIGENEN Fix-Commits skippen. `[ai-fix] security:` oder
      # `[ai-fix] design:` (von Stage 2/3 gepusht) ändern Applikationscode und
      # MÜSSEN einen frischen Stage-1-Review auslösen — sonst bliebe der
      # `ai-review/code`-Status am pre-fix-Commit hängen und der finale PR-Head
      # könnte Consensus mit einem stale Code-Review-Status passieren.
      - name: 'Detect own [ai-fix] code: commit (skip redundant re-review)'
        id: fix_guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MSG=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}" \
                  --jq '.commit.message' 2>/dev/null || echo "")
          FIRST_LINE=$(printf '%s\n' "$MSG" | head -n1)
          case "$FIRST_LINE" in
            \[ai-fix\]\ code:*)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "HEAD ist ein [ai-fix] code:-Commit — Review skippen (Parent-Run kuemmert sich)."
              ;;
            *)
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "HEAD erfordert frischen Review (erster Run oder [ai-fix] von anderer Stage)."
              ;;
          esac

      - name: Publish skipped code status for own fix commit
        if: steps.fix_guard.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/$PR_HEAD" \
            -f state=success \
            -f context="ai-review/code" \
            -f description="Skipped own [ai-fix] code commit; parent review owns validation" \
            -f target_url="$TARGET_URL"
          echo "ai-review/code → success (own [ai-fix] code skip)"

      - name: Checkout PR head
        if: steps.fix_guard.outputs.skip != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0 # Fix-loop & diffs brauchen History

      - name: Bootstrap runner PATH
        run: |
          echo "/usr/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup Python
        if: steps.fix_guard.outputs.skip != 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install ai-review-pipeline
        if: steps.fix_guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Consumer repos never install ai-review-pipeline from the PR worktree on a
          # pull_request self-hosted runner. The central pipeline repo may dogfood
          # its local package only for same-repo branches, never for forks.
          if [ "${{ github.repository }}" = "EtroxTaran/x-ai-stack" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            pip install -e packages/ai-review-pipeline
          else
            retry_ai_review_install() {
              local attempt=1
              local max_attempts=3
              local delay=5
              until "$@"; do
                local status=$?
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "::error::command failed after ${attempt} attempts: $*"
                  return "$status"
                fi
                echo "command failed (attempt ${attempt}/${max_attempts}); retrying in ${delay}s: $*"
                sleep "$delay"
                attempt=$((attempt + 1))
                delay=$((delay * 2))
              done
            }
            tmp_pipeline="$(mktemp -d)"
            retry_ai_review_install gh repo clone EtroxTaran/x-ai-stack "$tmp_pipeline" -- --depth 1 --branch main
            retry_ai_review_install pip install "$tmp_pipeline/packages/ai-review-pipeline"
          fi

      - name: Preflight — CLI OAuth presence
        if: steps.fix_guard.outputs.skip != 'true'
        run: echo "preflight skipped; ai-review stage runs with --skip-preflight"

      - name: Run Stage 1 — Codex code review
        if: steps.fix_guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          # Discord-Notification-Webhook (leer = kein Alert, kein Crash)
          DISCORD_NOTIFICATION_WEBHOOK: ${{ secrets.DISCORD_NOTIFICATION_WEBHOOK }}
        run: |
          # TELEGRAM_OPS_BOT_TOKEN / TELEGRAM_OPS_CHAT_ID / TELEGRAM_OPS_TOPIC_AI_REVIEW: bb8-local (gateway.env),
          # never on GitHub
          set -a; source "$HOME/.config/hermes/gateway.env" 2>/dev/null || true; set +a
          ai-review stage code-review \
            --pr ${{ github.event.pull_request.number }} \
            --max-iterations 2 \
            --skip-preflight \
            --skip-fix-loop
