---
# ai-review-template-version: 0.1.1
# NOTE: parametrized from ai-portal@2026-04-20
# Changes:
#   - python3 -m scripts.ai-review.consensus → python -m ai_review_pipeline.stages.consensus
#   - TELEGRAM_NOTIFICATION_WEBHOOK → DISCORD_NOTIFICATION_WEBHOOK
#   - github.repository bleibt dynamisch (kein hardcoded EtroxTaran/ai-portal)
#   - Poll-Stages-Liste enthält zusätzlich docs-validation
#     (Stage 5 ist neu; consensus aggregiert jetzt alle 5)
#   - Kein pull_request_target verwendet (war schon pull_request — konform)
# Wave 5 (2026-04-20):
#   - python -m ai_review_pipeline.stages.consensus → ai-review consensus

name: AI Review Consensus

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GH_REPO: ${{ github.repository }}
  AI_REVIEW_DISPATCH_URL: ${{ vars.AI_REVIEW_DISPATCH_URL || secrets.AI_REVIEW_DISPATCH_URL ||
    'http://127.0.0.1:5680/webhook/ai-review-dispatch' }}
  AI_REVIEW_METRICS_PATH: ${{ vars.AI_REVIEW_METRICS_PATH ||
    format('/home/clawd/.local/state/ai-review/metrics/{0}.jsonl', github.repository) }}

# Aggregiert alle Stage-Statuses inklusive ai-review/docs-validation.
# in einen einzigen Required-Status `ai-review/consensus`.
# Regel: alle aktivierten Stage-Kontexte muessen existieren; danach entscheidet der
# Python-Aggregator ueber success/failure/pending inkl. Soft-Nachfrage.
#
# Trigger auf `pull_request` (wie die Stages) + Fallback via `check_suite`
# für späte Stage-Abschlüsse. Der Consensus-Job macht einen Poll-and-retry:
# wenn Stage-Kontexte fehlen, wartet er bis zu 21 min in 30s-Intervallen.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Fallback: wenn der PR-Event schon fertig war, aber eine Stage später
  # ihren Status postet (Fix-Loop-Push o.ä.), re-triggert check_suite.
  check_suite:
    types: [completed]

concurrency:
  group: ai-review-consensus-${{ github.event.pull_request.number || github.event.check_suite.head_sha }}
  # Neuer PR-Head ersetzt alte Aggregatoren. Alte SHAs werden im Resolve-Step
  # zusaetzlich als No-Op beendet.
  cancel-in-progress: true

permissions:
  statuses: write
  checks: read
  actions: read
  pull-requests: read
  contents: read

jobs:
  consensus:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    # Consensus only reads GitHub statuses and writes the aggregate status/comment.
    # Keep it on GitHub-hosted capacity so it never occupies the only self-hosted
    # review runner while waiting for the review stages to finish.
    runs-on: ${{ fromJSON(vars.AI_REVIEW_STAGE_RUNS_ON || '["self-hosted","r2d2","ai-review"]') }}
    timeout-minutes: 30
    steps:
      - name: Bootstrap runner PATH
        run: |
          echo "/usr/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="/usr/bin:/usr/local/bin:$HOME/.npm-global/bin:$HOME/.local/bin:$PATH"
          command -v gh

      - name: Resolve PR + head SHA
        id: pr_head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Case 1: pull_request event → direkt aus github.event
          if [ -n "${{ github.event.pull_request.number || '' }}" ]; then
            PR="${{ github.event.pull_request.number }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            # Case 2: check_suite event — resolve PR aus head_sha
            HEAD_SHA="${{ github.event.check_suite.head_sha }}"
            PR=$(gh pr list --state open --search "$HEAD_SHA" --json number --jq '.[0].number // empty')
          fi
          if [ -z "${PR:-}" ] || [ -z "${HEAD_SHA:-}" ]; then
            echo "No open PR/SHA resolvable — skipping consensus."
            echo "sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CURRENT_SHA=$(gh pr view "$PR" --json headRefOid --jq '.headRefOid')
          if [ "$HEAD_SHA" != "$CURRENT_SHA" ]; then
            echo "Resolved stale SHA $HEAD_SHA for PR #$PR; current head is $CURRENT_SHA — skipping consensus."
            echo "sha=" >> "$GITHUB_OUTPUT"
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Author-Login für den Dependabot-Short-Circuit (#289): bei pull_request
          # direkt aus dem Event, bei check_suite via gh pr view nachgeladen.
          if [ -n "${{ github.event.pull_request.number || '' }}" ]; then
            AUTHOR="${{ github.event.pull_request.user.login }}"
          else
            AUTHOR=$(gh pr view "$PR" --json author --jq '.author.login // empty')
          fi
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          echo "sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "stale=false" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$PR at $HEAD_SHA (author=$AUTHOR)"

      - name: Checkout
        if: steps.pr_head.outputs.sha && steps.pr_head.outputs.stale != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.3
        with:
          ref: ${{ steps.pr_head.outputs.sha }}
          fetch-depth: 1

      - name: Setup Python
        if: steps.pr_head.outputs.sha && steps.pr_head.outputs.stale != 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install ai-review-pipeline
        if: steps.pr_head.outputs.sha && steps.pr_head.outputs.stale != 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Consumer repos never install ai-review-pipeline from the PR worktree on a
          # pull_request self-hosted runner. The central pipeline repo may dogfood
          # its local package only for same-repo branches, never for forks.
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ github.repository }}" = "EtroxTaran/x-ai-stack" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name || '' }}" = "${{ github.repository }}" ]; then
            pip install -e packages/ai-review-pipeline
          else
            retry_ai_review_install() {
              local attempt=1
              local max_attempts=3
              local delay=5
              until "$@"; do
                local status=$?
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "::error::command failed after ${attempt} attempts: $*"
                  return "$status"
                fi
                echo "command failed (attempt ${attempt}/${max_attempts}); retrying in ${delay}s: $*"
                sleep "$delay"
                attempt=$((attempt + 1))
                delay=$((delay * 2))
              done
            }
            tmp_pipeline="$(mktemp -d)"
            retry_ai_review_install gh repo clone EtroxTaran/x-ai-stack "$tmp_pipeline" -- --depth 1 --branch main
            retry_ai_review_install pip install "$tmp_pipeline/packages/ai-review-pipeline"
          fi

      - name: Dependabot consensus short-circuit
        # dependabot dep-bump PRs run NONE of the review stages (#289). Without
        # this the poll below waits 21 min for stage statuses that never arrive,
        # times out, and the PR never gets ai-review/consensus=success to auto-merge.
        # Write the aggregate directly via the tested aggregator (exact
        # dependabot[bot] allowlist — Renovate stays out; Phase-70 operator owns those).
        if: steps.pr_head.outputs.sha && steps.pr_head.outputs.stale != 'true' &&
          steps.pr_head.outputs.author == 'dependabot[bot]'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          PR_HEAD_SHA: ${{ steps.pr_head.outputs.sha }}
          PR_NUMBER: ${{ steps.pr_head.outputs.pr }}
        run: |
          set -euo pipefail
          TARGET_URL="${GITHUB_SERVER_URL}/${{ github.repository }}/actions/runs/${GITHUB_RUN_ID}"
          ai-review consensus \
            --sha "$PR_HEAD_SHA" \
            --pr "$PR_NUMBER" \
            --author "dependabot[bot]" \
            --target-url "$TARGET_URL"

      - name: Poll for stage completion + aggregate
        if: steps.pr_head.outputs.sha && steps.pr_head.outputs.stale != 'true' &&
          steps.pr_head.outputs.author != 'dependabot[bot]'
        env:
          # CROSS_REPO_PAT statt GITHUB_TOKEN: GitHub triggert downstream-Workflows
          # NICHT für commit-status-Events, die mit GITHUB_TOKEN erstellt werden
          # (Anti-Recursion-Safeguard). consensus.py schreibt aber genau diese
          # ai-review/consensus commit-status, und auto-merge-label.yml +
          # auto-fix-loop.yml sind genau dafür auf `on: status` registriert.
          # Ohne PAT-Token funktioniert die Auto-Pipeline nicht autonom — siehe
          # https://docs.github.com/actions/using-workflows/triggering-a-workflow#triggering-a-workflow-from-a-workflow
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          PR_HEAD_SHA: ${{ steps.pr_head.outputs.sha }}
          PR_NUMBER: ${{ steps.pr_head.outputs.pr }}
          DISCORD_NOTIFICATION_WEBHOOK: ${{ secrets.DISCORD_NOTIFICATION_WEBHOOK }}
        run: |
          # TELEGRAM_OPS_BOT_TOKEN / TELEGRAM_OPS_CHAT_ID / TELEGRAM_OPS_TOPIC_AI_REVIEW: bb8-local (gateway.env),
          # never on GitHub
          set -a; source "$HOME/.config/hermes/gateway.env" 2>/dev/null || true; set +a
          set -euo pipefail
          # Warten bis alle Stages terminal sind ODER 21 min abgelaufen.
          # Die Stages haben selbst ein 20-min-Hard-Wall; wir pollen 42-mal alle 30s.
          TARGET_URL="${GITHUB_SERVER_URL}/${{ github.repository }}/actions/runs/${GITHUB_RUN_ID}"
          CONSENSUS_POLL_ATTEMPTS=42
          CONSENSUS_POLL_INTERVAL_SECONDS=30
          CONSENSUS_TIMEOUT_MINUTES=$((CONSENSUS_POLL_ATTEMPTS * CONSENSUS_POLL_INTERVAL_SECONDS / 60))
          # Erwarteten Stage-Count NICHT hart kodieren (Issue #87/#128): aus den
          # aktivierten Stages in .ai-review/config.yaml ableiten. Deaktiviertes
          # Cursor-Stage (enabled:false) senkt den Count automatisch, sodass der
          # Konsens nicht 21 min auf einen nie geposteten Status wartet.
          EXPECTED_STAGE_COUNT=$(ai-review expected-stage-count --config-file .ai-review/config.yaml)
          # Fallback: bei leerem/ungueltigem Output (sollte nicht passieren) auf
          # die volle 6-Stage-Erwartung.
          DEFAULT_STAGE_COUNT=6
          case "$EXPECTED_STAGE_COUNT" in
            ''|*[!0-9]*) EXPECTED_STAGE_COUNT="$DEFAULT_STAGE_COUNT" ;;
          esac
          echo "Derived EXPECTED_STAGE_COUNT=$EXPECTED_STAGE_COUNT from .ai-review/config.yaml"

          for attempt in $(seq 1 "$CONSENSUS_POLL_ATTEMPTS"); do
            STATUS_SUMMARY=$(gh api "repos/${{ github.repository }}/commits/${PR_HEAD_SHA}/status" \
              --jq '[.statuses[] | select(.context | test(
                "^ai-review/(code|code-cursor|security|design|ac-validation|docs-validation)$"))]
                | sort_by(.created_at)
                | reduce .[] as $status ({}; .[$status.context] = $status.state)
                | {stage_count: length,
                   pending_count: ([to_entries[] | select(.value == "pending")] | length),
                   states: .}')
            STAGE_COUNT=$(printf '%s' "$STATUS_SUMMARY" | python3 -c 'import json, sys; print(
              json.load(sys.stdin)["stage_count"])')
            PENDING_COUNT=$(printf '%s' "$STATUS_SUMMARY" | python3 -c 'import json, sys; print(
              json.load(sys.stdin)["pending_count"])')
            STATES=$(printf '%s' "$STATUS_SUMMARY" | python3 -c 'import json, sys; print(json.dumps(
              json.load(sys.stdin)["states"], sort_keys=True))')
            echo "Attempt $attempt: stage_count=$STAGE_COUNT pending_count=$PENDING_COUNT states=$STATES"
            # Erst aggregieren, wenn alle erwarteten Stage-Kontexte terminal sind.
            if [ "$STAGE_COUNT" -ge "$EXPECTED_STAGE_COUNT" ] && [ "$PENDING_COUNT" -eq 0 ]; then
              echo "All stage contexts terminal, running consensus aggregator..."
              ai-review consensus \
                --sha "$PR_HEAD_SHA" \
                --pr "$PR_NUMBER" \
                --target-url "$TARGET_URL"
              exit 0
            fi
            sleep "$CONSENSUS_POLL_INTERVAL_SECONDS"
          done

          # Timeout — stage statuses did not become terminal inside the consensus poll budget.
          # Turn the required gate red instead of leaving ai-review/consensus stale forever.
          gh api "repos/${{ github.repository }}/statuses/${PR_HEAD_SHA}" \
            -f state=error \
            -f context="ai-review/consensus" \
            -f description="Consensus timeout after ${CONSENSUS_TIMEOUT_MINUTES}min; review stages did not complete" \
            -f target_url="$TARGET_URL"
          exit 0
