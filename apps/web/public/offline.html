<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>soccer-manager offline</title>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        background: #020617;
        color: #f8fafc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        min-height: 100vh;
        padding: 2rem 1rem;
      }

      section {
        max-width: 64rem;
        margin: 0 auto;
        border: 1px solid rgb(52 211 153 / 20%);
        border-radius: 1.5rem;
        background: rgb(15 23 42 / 80%);
        padding: 1.5rem;
      }

      h1 {
        max-width: 48rem;
        font-size: clamp(2.25rem, 8vw, 3.75rem);
        line-height: 1;
      }

      p {
        max-width: 42rem;
        color: #cbd5e1;
        font-size: 1.125rem;
        line-height: 1.75;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p>Offline bereit</p>
        <h1>Dein Fußballverein, offline spielbar und bereit für lange Karrieren.</h1>
        <p>
          Die installierte App-Shell ist lokal verfügbar. Vollständige Karrieresaves werden in
          IndexedDB aufgebaut.
        </p>
      </section>
    </main>
  </body>
</html>
