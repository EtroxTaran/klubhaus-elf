services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_URL: ${APP_URL:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgres://soccer_manager:soccer_manager@postgres:5432/soccer_manager}
    labels:
      traefik.enable: "true"
      traefik.http.routers.soccer-manager.rule: Host(`${APP_DOMAIN:-soccer-manager.etrox.de}`)
      traefik.http.routers.soccer-manager.entrypoints: websecure
      traefik.http.routers.soccer-manager.tls.certresolver: letsencrypt
      traefik.http.services.soccer-manager.loadbalancer.server.port: "3000"
    ports:
      - "3000:3000"
    restart: unless-stopped

  # System of record — PostgreSQL + Drizzle (ADR-0021, supersedes ADR-0001).
  # Single-node OSS; backup/PITR via pg_dump + WAL archiving to EU object
  # storage (see deployment-dokploy mandatory mitigations). SurrealDB may
  # return only as an optional additive realtime/graph engine (ADR-0023).
  postgres:
    image: postgres:17-alpine
    command: postgres -c wal_level=replica
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soccer_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soccer_manager}
      POSTGRES_DB: ${POSTGRES_DB:-soccer_manager}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soccer_manager}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
