  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;0,6..72,800;1,6..72,400;1,6..72,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;padding:0;background:#f0eee9;font-family:Inter,system-ui,sans-serif;color:#1a1410}
    *{box-sizing:border-box}
    /* Phone frame chrome */
    .phone-frame{position:relative;width:390px;height:844px;border-radius:38px;background:#0c0a08;padding:10px;
      box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 24px 48px -16px rgba(40,30,20,.18);overflow:hidden}
    .phone-screen{position:relative;width:100%;height:100%;border-radius:30px;overflow:hidden;display:flex;flex-direction:column}
    .phone-notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:108px;height:30px;border-radius:18px;background:#0c0a08;z-index:30}
    .phone-status{position:absolute;top:0;left:0;right:0;height:46px;padding:14px 28px 0;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;z-index:20;pointer-events:none}
    .phone-status .sig{display:flex;gap:5px;align-items:center}
    .phone-content{position:relative;flex:1;padding-top:46px;overflow:hidden;display:flex;flex-direction:column}
    /* Hide scrollbars inside screens */
    .phone-content *::-webkit-scrollbar{display:none}
    .phone-content *{scrollbar-width:none}
  </style>
</head>
<body>
