<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aurelia Premier — Onboarding Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;0,6..72,800;1,6..72,400;1,6..72,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --paper:#f4ede0;
      --paper-2:#fbf6ea;
      --rule:#d9cdb4;
      --ink:#1a1410;
      --ink-2:#2a221c;
      --muted:#5a4f44;
      --scarlet:#b7301b;
      --scarlet-deep:#8a2210;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#1a1410;color:#f0e7d4;
      font-family:Inter,system-ui,-apple-system,sans-serif;
      -webkit-font-smoothing:antialiased;}
    /* Stage background */
    body{
      min-height:100vh;
      background:
        radial-gradient(1200px 600px at 50% 10%, rgba(183,48,27,.10), transparent 60%),
        radial-gradient(800px 400px at 50% 90%, rgba(0,0,0,.5), transparent 60%),
        linear-gradient(180deg, #1a1410 0%, #0e0a07 100%);
    }

    /* Phone-frame chrome (verbatim from index.html so screens render identically) */
    .phone-frame{position:relative;width:390px;height:844px;border-radius:38px;background:#0c0a08;padding:10px;
      box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 24px 48px -16px rgba(0,0,0,.55), 0 40px 80px -20px rgba(0,0,0,.45);overflow:hidden}
    .phone-screen{position:relative;width:100%;height:100%;border-radius:30px;overflow:hidden;display:flex;flex-direction:column}
    .phone-notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:108px;height:30px;border-radius:18px;background:#0c0a08;z-index:30}
    .phone-status{position:absolute;top:0;left:0;right:0;height:46px;padding:14px 28px 0;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;z-index:20;pointer-events:none}
    .phone-status .sig{display:flex;gap:5px;align-items:center}
    .phone-content{position:relative;flex:1;padding-top:46px;overflow:hidden;display:flex;flex-direction:column}
    .phone-content *::-webkit-scrollbar{display:none}
    .phone-content *{scrollbar-width:none}

    /* ── Prototype shell ──────────────────────────────────────── */
    .proto-root{
      min-height:100vh;display:grid;grid-template-rows:auto 1fr auto;
    }

    /* Header */
    .proto-head{
      display:grid;grid-template-columns:300px 1fr auto;gap:24px;align-items:center;
      padding:18px 32px;border-bottom:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.25);
      backdrop-filter:blur(6px);
    }
    .proto-edition{display:flex;align-items:center;gap:12px}
    .proto-mark{
      width:38px;height:38px;border-radius:50%;background:var(--scarlet);color:#fff;
      display:grid;place-items:center;font-family:'Newsreader',serif;font-weight:800;font-size:17px;
      box-shadow:inset 0 -2px 0 rgba(0,0,0,.18);letter-spacing:-.4px;
    }
    .proto-edition-title{
      font-family:'Newsreader',serif;font-weight:700;font-size:20px;line-height:1;color:#f6efdc;
      letter-spacing:-.3px;
    }
    .proto-edition-title em{font-style:italic;font-weight:600}
    .proto-edition-sub{
      font-weight:500;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;
      color:rgba(240,231,212,.55);margin-top:4px;
    }
    .proto-step{display:flex;gap:16px;align-items:center;min-width:0}
    .proto-step-num{
      font-family:'JetBrains Mono',ui-monospace,monospace;display:flex;align-items:baseline;gap:4px;flex-shrink:0;
    }
    .proto-step-now{font-size:30px;font-weight:600;color:var(--scarlet);letter-spacing:-1px}
    .proto-step-of{font-size:14px;color:rgba(240,231,212,.45);font-weight:400}
    .proto-step-body{min-width:0;display:flex;flex-direction:column;gap:2px}
    .proto-step-name{
      font-family:'Newsreader',serif;font-weight:600;font-size:18px;line-height:1.1;
      color:#f6efdc;letter-spacing:-.2px;text-wrap:balance;
    }
    .proto-step-sub{
      font-size:12.5px;line-height:1.4;color:rgba(240,231,212,.65);font-style:italic;
      font-family:'Newsreader',serif;text-wrap:pretty;max-width:60ch;
    }
    .proto-actions{display:flex;gap:6px;align-items:center}
    .proto-btn{
      appearance:none;border:1px solid rgba(240,231,212,.18);background:transparent;color:#f0e7d4;
      width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:16px;
      display:grid;place-items:center;font-family:inherit;transition:all .15s ease;
    }
    .proto-btn:hover:not(:disabled){background:rgba(240,231,212,.06);border-color:rgba(240,231,212,.3)}
    .proto-btn:disabled{opacity:.3;cursor:not-allowed}
    .proto-btn-link{
      width:auto;padding:0 14px;border-radius:20px;text-decoration:none;font-size:12px;
      font-weight:500;letter-spacing:.3px;
    }

    /* Stage */
    .proto-stage{
      display:grid;place-items:center;padding:30px 20px;position:relative;min-height:0;
    }
    .proto-phone-wrap{
      cursor:pointer;
      transition:transform .25s cubic-bezier(.2,.8,.2,1), opacity .2s ease, filter .2s ease;
      transform:translateY(0);
      outline:none;
    }
    .proto-phone-wrap:hover{transform:translateY(-2px) scale(1.003)}
    .proto-phone-wrap:active{transform:translateY(0) scale(.997)}
    .proto-phone-wrap:focus-visible{outline:2px solid var(--scarlet);outline-offset:24px;border-radius:46px}
    .proto-phone-wrap.is-fading{opacity:0;filter:blur(2px)}

    /* Hint dot — pulsing ring + flag label */
    .proto-hint{font-family:'Inter',sans-serif}
    .proto-dot{
      display:block;width:18px;height:18px;border-radius:50%;
      background:var(--scarlet);
      box-shadow:0 0 0 3px rgba(255,255,255,.95), 0 4px 10px rgba(0,0,0,.25);
      position:relative;z-index:2;
    }
    .proto-pulse, .proto-pulse-2{
      position:absolute;left:50%;top:50%;width:18px;height:18px;border-radius:50%;
      background:var(--scarlet);transform:translate(-50%,-50%);opacity:.45;
      animation:protoPulse 2.2s cubic-bezier(.2,.8,.2,1) infinite;
    }
    .proto-pulse-2{animation-delay:1.1s}
    @keyframes protoPulse{
      0%{transform:translate(-50%,-50%) scale(1);opacity:.55}
      80%{transform:translate(-50%,-50%) scale(3.6);opacity:0}
      100%{transform:translate(-50%,-50%) scale(3.6);opacity:0}
    }
    .proto-flag{
      display:inline-block;padding:5px 10px;border-radius:3px;
      background:var(--scarlet);color:#fff;font-size:11px;font-weight:600;
      letter-spacing:.6px;text-transform:uppercase;
      box-shadow:0 4px 10px rgba(0,0,0,.25);
      font-family:'Inter',sans-serif;
    }

    /* Footer / progress */
    .proto-foot{
      padding:16px 32px 22px;border-top:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.25);
      display:flex;flex-direction:column;gap:10px;align-items:center;
    }
    .proto-dots{
      display:flex;gap:0;justify-content:center;flex-wrap:wrap;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
      border-radius:12px;padding:6px;
    }
    .proto-dot-btn{
      appearance:none;border:0;background:transparent;color:rgba(240,231,212,.55);
      display:flex;align-items:center;gap:8px;cursor:pointer;
      padding:8px 14px;border-radius:7px;font-family:inherit;font-size:12px;
      transition:all .15s ease;
    }
    .proto-dot-btn:hover{background:rgba(255,255,255,.05);color:#f0e7d4}
    .proto-dot-btn.is-active{background:var(--scarlet);color:#fff}
    .proto-dot-btn.is-active .proto-dot-num{color:rgba(255,255,255,.7)}
    .proto-dot-btn.is-done{color:rgba(240,231,212,.85)}
    .proto-dot-mark{
      width:7px;height:7px;border-radius:50%;
      background:currentColor;opacity:.7;display:none;
    }
    .proto-dot-label{display:flex;align-items:baseline;gap:6px}
    .proto-dot-num{
      font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;
      color:rgba(240,231,212,.4);letter-spacing:.5px;
    }
    .proto-dot-name{font-weight:500;letter-spacing:.1px}
    .proto-dot-btn.is-active .proto-dot-name{font-weight:600}

    .proto-hint-bar{
      font-size:11px;color:rgba(240,231,212,.4);letter-spacing:.3px;
      display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:center;
    }
    .proto-hint-bar kbd{
      font-family:'JetBrains Mono',monospace;font-size:10px;
      background:rgba(240,231,212,.08);color:rgba(240,231,212,.7);
      padding:2px 6px;border-radius:3px;
      border:1px solid rgba(240,231,212,.1);
      margin:0 2px;
    }

    /* Responsive — stack header on small screens */
    @media (max-width: 900px){
      .proto-head{grid-template-columns:1fr;gap:12px;padding:14px 18px}
      .proto-actions{justify-content:flex-end}
      .proto-step{grid-row:2}
      .proto-edition{justify-content:flex-start}
      .proto-stage{padding:18px 12px}
      .proto-foot{padding:12px 16px 18px}
      .proto-dot-name{display:none}
      .proto-dot-btn{padding:8px 10px}
    }
    @media (max-height: 950px){
      .proto-stage{padding:18px 20px}
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Dependencies (subset of index.html — only what the 6 screens need) -->
  <script type="text/babel" src="system.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="negotiations.jsx"></script>
  <script type="text/babel" src="identity.jsx"></script>
  <script type="text/babel" src="stadium.jsx"></script>
  <script type="text/babel" src="tactics.jsx"></script>
  <script type="text/babel" src="team.jsx"></script>
  <script type="text/babel" src="compare.jsx"></script>
  <script type="text/babel" src="more.jsx"></script>
  <script type="text/babel" src="settings.jsx"></script>
  <script type="text/babel" src="depth.jsx"></script>
  <script type="text/babel" src="live-demo.jsx"></script>
  <script type="text/babel" src="screens-part1.jsx"></script>
  <script type="text/babel" src="screens-part2.jsx"></script>

  <!-- Prototype shell + Onboarding flow -->
  <script type="text/babel" src="prototype-shell.jsx"></script>
  <script type="text/babel" src="onboarding-app.jsx"></script>
</body>
</html>
