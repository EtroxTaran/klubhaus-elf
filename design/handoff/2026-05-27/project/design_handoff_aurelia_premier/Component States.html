<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aurelia Premier — Component States Sheet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;0,6..72,800;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --paper:#f4ede0;
      --paper-2:#fbf6ea;
      --rule:#d9cdb4;
      --rule-2:#c9bb9d;
      --ink:#1a1410;
      --ink-2:#2a221c;
      --muted:#5a4f44;
      --scarlet:#b7301b;
      --scarlet-deep:#8a2210;
      --serif:'Newsreader',Georgia,serif;
      --ui:'Inter',system-ui,-apple-system,sans-serif;
      --mono:'JetBrains Mono',ui-monospace,monospace;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#e8dfcb;color:var(--ink);font-family:var(--ui);
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    a{color:inherit;text-decoration:none}
    code{font-family:var(--mono);font-size:.9em}

    /* Phone-frame chrome (in case anything inside renders inside one) */
    .phone-frame{position:relative;width:390px;height:844px;border-radius:38px;background:#0c0a08;padding:10px;
      box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 24px 48px -16px rgba(40,30,20,.18);overflow:hidden}
    .phone-screen{position:relative;width:100%;height:100%;border-radius:30px;overflow:hidden;display:flex;flex-direction:column}

    /* ── QA Sheet ────────────────────────────────────────────── */
    .qa-sheet{max-width:1480px;margin:0 auto;background:var(--paper);
      box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 30px 60px -30px rgba(40,30,20,.35),
        0 80px 120px -40px rgba(40,30,20,.25);
      border:1px solid var(--rule);min-height:100vh;
    }

    /* Masthead — sticky-friendly */
    .qa-mast{
      display:grid;grid-template-columns:1fr auto auto;gap:24px;align-items:center;
      padding:18px 36px;border-bottom:3px double var(--ink);background:var(--paper);
      position:sticky;top:0;z-index:20;
    }
    .qa-mast-left{display:flex;align-items:center;gap:12px}
    .qa-mark{
      width:38px;height:38px;border-radius:50%;background:var(--scarlet);color:#fff;
      display:grid;place-items:center;font-family:var(--serif);font-weight:800;font-size:17px;
      box-shadow:inset 0 -2px 0 rgba(0,0,0,.18);letter-spacing:-.4px;
    }
    .qa-mast-title{font-family:var(--serif);font-weight:700;font-size:22px;line-height:1;letter-spacing:-.3px}
    .qa-mast-title em{font-style:italic;font-weight:600}
    .qa-mast-sub{
      font-weight:500;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;
      color:var(--muted);margin-top:4px;
    }
    .qa-mast-nav{display:flex;gap:2px}
    .qa-mast-nav a{
      padding:6px 12px;font-size:12px;font-weight:600;color:var(--ink);border-radius:6px;
      transition:background .12s ease;
    }
    .qa-mast-nav a:hover{background:rgba(0,0,0,.05);color:var(--scarlet)}
    .qa-mast-meta{font-family:var(--mono);font-size:11px;color:var(--muted)}
    .qa-mast-back{
      padding:8px 14px;border:1.5px solid var(--ink);border-radius:20px;font-size:12px;font-weight:600;
      transition:all .12s ease;
    }
    .qa-mast-back:hover{background:var(--ink);color:var(--paper)}

    /* Strap */
    .qa-strap{
      padding:9px 36px;background:var(--ink);color:#f0e7d4;display:flex;align-items:center;gap:14px;
      font-size:11px;letter-spacing:.5px;
    }
    .qa-strap b{color:#fff;font-weight:600}
    .qa-strap code{color:#f0e7d4;background:rgba(255,255,255,.08);padding:2px 6px;border-radius:3px}
    .qa-strap-spacer{flex:1}
    .qa-strap-legend{display:flex;gap:6px;align-items:center}

    /* Section */
    .qa-section{padding:28px 36px 36px;border-bottom:1px solid var(--rule)}
    .qa-sec-head{margin-bottom:20px;display:flex;flex-direction:column;gap:4px;
      padding-bottom:14px;border-bottom:1px solid var(--ink)}
    .qa-sec-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
    .qa-sec-kicker{
      font-weight:700;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--scarlet);
    }
    .qa-sec-count{
      font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.4px;
    }
    .qa-sec-head h2{font-family:var(--serif);font-weight:700;font-size:30px;line-height:1;letter-spacing:-.4px;margin:0}
    .qa-sec-head p{font-family:var(--serif);font-size:15px;color:var(--ink-2);font-style:italic;margin:6px 0 0;max-width:75ch;line-height:1.4}

    /* Component block */
    .qa-component{margin-top:24px;padding-top:20px;border-top:1px dotted var(--rule-2)}
    .qa-component:first-of-type{border-top:0;padding-top:0;margin-top:0}
    .qa-comp-head{margin-bottom:14px;display:flex;flex-direction:column;gap:4px}
    .qa-comp-line{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
    .qa-comp-head h3{font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:-.2px;margin:0;color:var(--ink)}
    .qa-comp-file{font-family:var(--mono);font-size:11px;color:var(--scarlet);background:rgba(183,48,27,.08);
      padding:2px 8px;border-radius:3px;font-weight:500}
    .qa-comp-desc{font-family:var(--serif);font-size:14px;color:var(--ink-2);margin:0;max-width:70ch;line-height:1.4;font-style:italic}
    .qa-comp-props{
      display:inline-block;font-family:var(--mono);font-size:11px;color:var(--muted);
      background:var(--paper-2);border:1px solid var(--rule);border-radius:3px;
      padding:4px 8px;margin-top:2px;align-self:flex-start;line-height:1.4;
    }

    /* State grid */
    .qa-states{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start}

    .qa-cell{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
    .qa-cell-head{display:flex;align-items:center;gap:8px;justify-content:space-between}
    .qa-pill{
      display:inline-block;padding:3px 8px;border-radius:2px;font-family:var(--ui);
      font-weight:700;font-size:9.5px;letter-spacing:.8px;text-transform:uppercase;line-height:1;
    }
    .qa-pill-default,.qa-pill-variant{background:#1a1410;color:#f0e7d4}
    .qa-pill-state{background:#3b6e3e;color:#fff}
    .qa-pill-mocked{background:transparent;color:var(--scarlet);border:1px dashed var(--scarlet);padding:2px 7px}
    .qa-cell-note{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:right}
    .qa-cell-stage{
      background:var(--paper-2);border:1px solid var(--rule);border-radius:8px;
      padding:18px;display:flex;align-items:center;justify-content:center;
      min-height:80px;position:relative;
      /* checker pattern subtle */
      background-image:
        linear-gradient(45deg, rgba(0,0,0,.012) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(0,0,0,.012) 25%, transparent 25%);
      background-size:14px 14px;
    }
    .qa-cell-stage > div[data-theme]{width:100%}

    /* Skeleton shimmer */
    .qa-skel{
      background:linear-gradient(90deg,
        rgba(26,20,16,.06) 0%, rgba(26,20,16,.14) 50%, rgba(26,20,16,.06) 100%);
      background-size:200% 100%;animation:qaShimmer 1.6s ease-in-out infinite;
    }
    @keyframes qaShimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

    /* Spinner */
    .qa-spinner{
      width:16px;height:16px;border-radius:50%;
      border:2px solid rgba(244,237,224,.25);border-top-color:rgba(244,237,224,.85);
      animation:qaSpin .8s linear infinite;
    }
    .qa-spinner-sm{width:12px;height:12px;border-width:1.5px;border-color:rgba(255,255,255,.4);border-top-color:#fff}
    @keyframes qaSpin{to{transform:rotate(360deg)}}

    /* Force-hover / disabled / focus simulators (visual only, no events) */
    .qa-force-hover > button,
    .qa-force-hover > div > button{
      transform:translateY(-1px);
      box-shadow:0 12px 24px -10px rgba(0,0,0,.5)!important;
      filter:brightness(1.04);
    }
    .qa-force-disabled{opacity:.45;filter:saturate(.4) grayscale(.2);pointer-events:none}
    .qa-force-focus > button,
    button.qa-force-focus{
      outline:2px solid var(--scarlet);outline-offset:3px;
    }

    /* Icon button (atom shown in §1) */
    .qa-iconbtn{
      width:36px;height:36px;border-radius:50%;border:1px solid var(--rule);
      background:transparent;display:grid;place-items:center;cursor:pointer;
      transition:all .12s ease;
    }
    .qa-iconbtn:hover{background:rgba(0,0,0,.05);border-color:var(--ink)}
    .qa-iconbtn:disabled{opacity:.35;cursor:not-allowed}
    .qa-iconbtn.is-active{background:var(--ink);border-color:var(--ink)}

    /* Footer */
    .qa-foot{padding:36px 36px 44px;background:var(--paper-2)}
    .qa-foot-cols{display:grid;grid-template-columns:1fr 1.5fr 1fr;gap:36px}
    .qa-foot-kicker{font-weight:700;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--scarlet)}
    .qa-foot-title{font-family:var(--serif);font-weight:700;font-size:26px;margin-top:6px;letter-spacing:-.4px}
    .qa-foot-title em{font-style:italic;font-weight:600}
    .qa-foot-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px}
    .qa-foot-keys{display:flex;flex-direction:column;gap:10px}
    .qa-foot-key-row{display:flex;gap:10px;align-items:center;font-family:var(--serif);font-size:13px;color:var(--ink-2)}
    .qa-foot-links{display:flex;flex-direction:column;gap:6px;font-family:var(--mono);font-size:12px;align-items:flex-start}
    .qa-foot-links a{color:var(--ink);border-bottom:1px dotted var(--rule-2);padding-bottom:1px}
    .qa-foot-links a:hover{color:var(--scarlet);border-color:var(--scarlet)}

    @media (max-width: 1100px){
      .qa-mast{grid-template-columns:1fr auto;padding:14px 22px}
      .qa-mast-nav{display:none}
      .qa-strap{padding:8px 22px;flex-wrap:wrap}
      .qa-section{padding:22px 22px 28px}
      .qa-foot{padding:24px 22px}
      .qa-foot-cols{grid-template-columns:1fr;gap:24px}
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Component deps (subset of index.html) -->
  <script type="text/babel" src="system.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="negotiations.jsx"></script>
  <script type="text/babel" src="identity.jsx"></script>
  <script type="text/babel" src="stadium.jsx"></script>
  <script type="text/babel" src="tactics.jsx"></script>
  <script type="text/babel" src="depth.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens-part1.jsx"></script>

  <!-- The QA sheet -->
  <script type="text/babel" src="component-states.jsx"></script>
</body>
</html>
