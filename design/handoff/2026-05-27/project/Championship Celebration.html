<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Championship Celebration · R3F</title>
<style>
  :root {
    --bg: #07080c;
    --panel: rgba(14,16,22,0.78);
    --panel-border: rgba(255,255,255,0.08);
    --fg: #eef0f5;
    --muted: #8a8f9c;
    --accent: #ffd56b;
  }
  * { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; height: 100%; background: var(--bg); }
  body {
    color: var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  canvas { display: block; }
  .stage { position: fixed; inset: 0; }
  .panel {
    position: fixed;
    left: 20px; top: 20px;
    width: 280px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 16px 16px 14px;
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    z-index: 5;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
  }
  .panel h1 {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 12px;
    font-weight: 600;
  }
  .row { margin-bottom: 12px; }
  .row label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .swatches { display: flex; gap: 6px; flex-wrap: wrap; }
  .swatch {
    width: 28px; height: 28px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    cursor: pointer; position: relative;
    transition: transform 120ms ease, border-color 120ms ease;
  }
  .swatch:hover { transform: translateY(-1px); }
  .swatch.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255,213,107,0.25); }
  .seg {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--panel-border);
    border-radius: 10px; padding: 3px;
  }
  .seg button {
    background: transparent; border: 0; color: var(--fg);
    padding: 6px 4px; font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; border-radius: 7px; cursor: pointer;
    font-family: inherit;
  }
  .seg button.active { background: rgba(255,255,255,0.10); color: var(--accent); }
  .seg button:hover:not(.active) { background: rgba(255,255,255,0.04); }
  .toggle {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    cursor: pointer; user-select: none;
  }
  .toggle .dot {
    width: 36px; height: 20px; border-radius: 999px;
    background: rgba(255,255,255,0.12); position: relative;
    transition: background 160ms ease;
  }
  .toggle .dot::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--fg); transition: transform 160ms ease;
  }
  .toggle.on .dot { background: var(--accent); }
  .toggle.on .dot::after { transform: translateX(16px); background: #1a1408; }
  .toggle span { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg); }
  .preset-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .preset {
    border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.03);
    color: var(--fg);
    padding: 8px; border-radius: 10px; cursor: pointer;
    font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
    font-family: inherit;
  }
  .preset:hover { background: rgba(255,255,255,0.06); }
  .preset .chips { display: flex; gap: 3px; }
  .preset .chip { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.4); }
  .footer {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); z-index: 5;
  }
  .footer b { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
  <div id="root"></div>
  <div class="footer">CHAMPIONSHIP&nbsp;CELEBRATION · <b>R3F SCENE</b> · DRAG TO ORBIT</div>

  <!-- Three / R3F / drei via UMD-friendly ESM-shim -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.160.0",
      "react": "https://esm.sh/react@18.3.1",
      "react/": "https://esm.sh/react@18.3.1/",
      "react-dom": "https://esm.sh/react-dom@18.3.1?deps=react@18.3.1",
      "react-dom/": "https://esm.sh/react-dom@18.3.1/",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react/jsx-dev-runtime": "https://esm.sh/react@18.3.1/jsx-dev-runtime",
      "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.17.10?deps=react@18.3.1,react-dom@18.3.1,three@0.160.0&external=react,react-dom,three",
      "@react-three/drei": "https://esm.sh/@react-three/drei@9.114.0?deps=react@18.3.1,react-dom@18.3.1,three@0.160.0,@react-three/fiber@8.17.10&external=react,react-dom,three,@react-three/fiber"
    }
  }
  </script>

  <!-- Bridge ESM modules to globals so our Babel JSX can use them -->
  <script type="module">
    import * as THREE from 'three';
    import * as React from 'react';
    import * as ReactDOM from 'react-dom/client';
    import * as RTF from '@react-three/fiber';
    import * as Drei from '@react-three/drei';
    window.THREE = THREE;
    window.React = React;
    window.ReactDOM = ReactDOM;
    window.ReactThreeFiber = RTF;
    window.Drei = Drei;
    window.dispatchEvent(new Event('libs-ready'));
  </script>

  <!-- React + Babel for our JSX (the babel transform reads window.React) -->
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    // Fetch JSX, transform with Babel-standalone, then execute in order.
    async function fetchAndRun(url) {
      const src = await fetch(url).then((r) => {
        if (!r.ok) throw new Error('Failed to load ' + url + ': ' + r.status);
        return r.text();
      });
      const { code } = window.Babel.transform(src, {
        presets: [['react', { runtime: 'classic' }]],
        sourceType: 'script',
        filename: url,
      });
      // Use indirect eval so the code runs in global scope
      (0, eval)(code + '\n//# sourceURL=' + url);
    }

    async function boot() {
      try {
        await fetchAndRun('ChampionshipCelebration.jsx');
        await fetchAndRun('celebration-host.jsx');
      } catch (err) {
        console.error('Boot failed:', err);
        const el = document.getElementById('root');
        if (el) el.innerHTML = '<pre style="color:#f88;padding:20px;font:12px/1.5 monospace;">' +
          (err && err.stack || err) + '</pre>';
      }
    }

    function waitForLibs() {
      if (window.ReactThreeFiber && window.Babel) return boot();
      const onLibs = () => { if (window.Babel) boot(); };
      window.addEventListener('libs-ready', onLibs, { once: true });
      // Babel-standalone is a regular script; if it loaded after libs-ready,
      // poll briefly for it.
      const t = setInterval(() => {
        if (window.ReactThreeFiber && window.Babel) {
          clearInterval(t);
          boot();
        }
      }, 50);
    }
    waitForLibs();
  </script>
</body>
</html>
