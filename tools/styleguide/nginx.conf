server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  # Landing page = the hub, which IS index.html (the heavy 34-script design canvas
  # was renamed to canvas.html at build time). Robust under any default config.
  index index.html;

  # .glb/.gltf get a correct binary type if the iso scene ever ships a model
  # (today it is fully procedural, so this is defensive/future-proof).
  location ~* \.(glb|gltf)$ {
    types { model/gltf-binary glb; model/gltf+json gltf; }
    default_type application/octet-stream;
    expires 1d;
    access_log off;
    try_files $uri =404;
  }

  # .jsx files are loaded via <script type="text/babel" src="…"> and transpiled
  # in-browser by the Babel CDN; serve them as JS text. (Babylon's stadium uses
  # type="module" .js, which nginx already serves as application/javascript.)
  location ~* \.jsx$ {
    default_type application/javascript;
    expires 1d;
    access_log off;
  }

  location ~* \.(css|js|mjs|woff2?|ttf|otf|svg|png|jpe?g|gif|webp|ico|json|map)$ {
    expires 1d;
    access_log off;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
