server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # .jsx files are loaded via <script type="text/babel" src="…"> and transpiled
  # in-browser by the Babel CDN; serve them as JS text. (Babylon's stadium uses
  # type="module" .js, which nginx already serves as application/javascript.)
  location ~* \.jsx$ {
    default_type application/javascript;
    expires 1d;
    access_log off;
  }

  location ~* \.(css|js|mjs|woff2?|ttf|otf|svg|png|jpe?g|gif|webp|ico|json|map)$ {
    expires 1d;
    access_log off;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
