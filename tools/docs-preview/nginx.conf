server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Quartz emits clean URLs: /a/b is the file /a/b.html (or /a/b/index.html).
  # Stock nginx 404s on extensionless paths, so resolve them explicitly.
  location / {
    try_files $uri $uri.html $uri/ /404.html;
  }

  # Quartz builds a styled 404.html.
  error_page 404 /404.html;
  location = /404.html {
    internal;
  }

  location ~* \.(css|js|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico|json|xml|txt)$ {
    expires 7d;
    access_log off;
    try_files $uri =404;
  }
}
