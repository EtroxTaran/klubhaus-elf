server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Storybook static is NOT an SPA: it ships real files (index.html,
  # iframe.html, index.json, assets/*) and routes via query/hash, not server
  # paths. A blanket /index.html fallback would serve the manager HTML in
  # place of the preview iframe / missing assets and break the manager↔preview
  # channel ("unable to determine the source of the event"). So: serve real
  # files, 404 otherwise.
  location / {
    try_files $uri $uri/ =404;
  }

  location ~* \.(css|js|mjs|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico|json|map)$ {
    expires 7d;
    access_log off;
    try_files $uri =404;
  }
}
