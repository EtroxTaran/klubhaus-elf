server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Storybook is a static SPA; unknown paths fall back to the manager shell.
  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(css|js|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico|json|map)$ {
    expires 7d;
    access_log off;
    try_files $uri =404;
  }
}
